name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V18.3 ĐẦY ĐỦ"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '100x'
        type: choice
        options:
          - 50x
          - 100x
          - 200x
      target_count:
        description: '🎯 SỐ WEB CẦN CHỌN'
        required: false
        default: '150'
        type: choice
        options:
          - 100
          - 150
          - 200
          - 300
  schedule:
    - cron: '*/30 * * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: 🧠 KHỞI TẠO CHIP V18.3
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                            ║"
          echo "║     🧠 CHIP V18.3 - ĐẦY ĐỦ - TỰ ĐỘNG TÌM WEB TOÀN CẦU                   ║"
          echo "║                                                                            ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔥 CẤP ĐỘ AI: ${{ github.event.inputs.ai_level || '100x' }}"
          echo "🚀 CHẾ ĐỘ QUÉT: ${{ github.event.inputs.scan_mode || 'ultimate' }}"
          echo "🎯 SỐ WEB CẦN CHỌN: ${{ github.event.inputs.target_count || '150' }}"
          echo ""
          echo "⚡ TÍNH NĂNG CHIP V18.3:"
          echo "  🌍 TỰ ĐỘNG TÌM WEB TOÀN CẦU (HackerOne, Bugcrowd, Immunefi, Top1M)"
          echo "  📊 BÁO CÁO SIÊU CHI TIẾT (TEXT + HTML)"
          echo "  💰 PHÂN LOẠI LỖI CÓ TIỀN / KHÔNG TIỀN"
          echo "  🔗 DANH SÁCH CVE ĐẦY ĐỦ"
          echo "  🔄 CẬP NHẬT DỮ LIỆU MỖI 30 PHÚT"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ + 15+ TEMPLATE
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            jq curl git python3 python3-pip massdns nmap ffuf unzip wget
          sudo rm -rf /var/lib/apt/lists/*
          
          wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          pip3 install -q requests beautifulsoup4 lxml
          
          for i in 1 2 3; do
            nuclei -update-templates -silent && break || sleep 5
          done
          
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          
          # 15+ template
          for repo in projectdiscovery/nuclei-templates geeknik/nuclei-templates notnotnotveg/nuclei-templates random-robbie/nuclei-templates zeroc00I/nuclei-templates gwen001/nuclei-templates dhiyaneshdk/nuclei-templates pikpikcu/nuclei-templates ehsandeep/nuclei-templates ddworken/nuclei-templates s0md3v/nuclei-templates r3naissance/nuclei-templates loneferret/nuclei-templates initstring/nuclei-templates codingo/nuclei-templates; do
            name=$(echo $repo | cut -d'/' -f2)
            git clone --depth 1 -q "https://github.com/$repo.git" "$name" 2>/dev/null || true
          done
          
          mkdir -p all
          find . -name "*.yaml" -exec cp {} all/ \; 2>/dev/null
          
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 🌍 TỰ ĐỘNG TÌM WEB TOÀN CẦU
        id: find_targets
        run: |
          echo "🌍 CHIP V18.3 - ĐANG TÌM WEB TOÀN CẦU + BUG BOUNTY..."
          
          curl -s -o /tmp/finder.py https://gist.githubusercontent.com/raw/your_script 2>/dev/null || cat > /tmp/finder.py << 'EOF'
          import json, requests, subprocess, time, re
          from bs4 import BeautifulSoup
          
          print("🧠 CHIP V18.3 - SMART FINDER PRO")
          print("🔍 ĐANG QUÉT HÀNG TỶ WEB + BUG BOUNTY...")
          
          all_targets = []
          seen = set()
          
          # 1. HackerOne
          print("📥 1. HACKERONE...")
          try:
              r = requests.get("https://hackerone.com/programs/search?query=type:public", timeout=30)
              if r.status_code == 200:
                  for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                      domain = part.strip().lower()
                      if domain not in seen and len(domain) > 3:
                          seen.add(domain); all_targets.append({"domain": domain, "source": "HackerOne", "score": 90})
          except Exception as e:
              print(f"  ⚠️ Lỗi: {e}")
          print(f"  ✅ Lấy {len(all_targets)} web từ HackerOne")
          
          # 2. Bugcrowd
          print("📥 2. BUGCROWD...")
          try:
              r = requests.get("https://bugcrowd.com/programs", timeout=30)
              if r.status_code == 200:
                  for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                      domain = part.strip().lower()
                      if domain not in seen and len(domain) > 3:
                          seen.add(domain); all_targets.append({"domain": domain, "source": "Bugcrowd", "score": 85})
          except Exception as e:
              print(f"  ⚠️ Lỗi: {e}")
          print(f"  ✅ Lấy {len(all_targets)} web từ Bugcrowd")
          
          # 3. Immunefi
          print("📥 3. IMMUNEFI...")
          try:
              r = requests.get("https://immunefi.com/explore/", timeout=30)
              if r.status_code == 200:
                  for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                      domain = part.strip().lower()
                      if domain not in seen and len(domain) > 3:
                          seen.add(domain); all_targets.append({"domain": domain, "source": "Immunefi", "score": 95})
          except Exception as e:
              print(f"  ⚠️ Lỗi: {e}")
          print(f"  ✅ Lấy {len(all_targets)} web từ Immunefi")
          
          # 4. Top 1M
          print("📥 4. TOP 1M...")
          try:
              r = requests.get("https://raw.githubusercontent.com/mehulj94/top-1m/master/top-1m.txt", timeout=30)
              if r.status_code == 200:
                  count = 0
                  for line in r.text.splitlines()[:2000]:
                      domain = line.strip().lower()
                      if domain and "." in domain and domain not in seen:
                          score = 20
                          if any(kw in domain for kw in ["bank","finance","pay"]): score += 30
                          if any(kw in domain for kw in ["crypto","blockchain","defi"]): score += 35
                          if any(kw in domain for kw in ["gov","government"]): score += 25
                          if any(kw in domain for kw in ["api","auth","login"]): score += 20
                          if domain.endswith(".gov") or domain.endswith(".edu"): score += 10
                          if score > 30:
                              seen.add(domain); all_targets.append({"domain": domain, "source": "Top1M", "score": score})
                              count += 1
                  print(f"  ✅ Lấy {count} web từ Top1M")
          except Exception as e:
              print(f"  ⚠️ Lỗi: {e}")
          
          # 5. Danh sách có sẵn
          print("📥 5. DANH SÁCH CÓ SẴN...")
          sites = ["google.com","facebook.com","youtube.com","twitter.com","linkedin.com","reddit.com","netflix.com","amazon.com","microsoft.com","apple.com","adobe.com","salesforce.com","oracle.com","ibm.com","bbc.com","guardian.co.uk","reuters.com","bloomberg.com","ft.com","alibaba.com","tencent.com","baidu.com","jd.com","naver.com","stripe.com","paypal.com","shopify.com","github.com","gitlab.com","vietnamnet.vn","zingnews.vn","tiki.vn","shopee.vn","fpt.vn","viettel.vn","thegioididong.com","vnexpress.net","dantri.com.vn","chinhphu.vn","mof.gov.vn","mic.gov.vn","moit.gov.vn"]
          for site in sites:
              if site not in seen:
                  seen.add(site); all_targets.append({"domain": site, "source": "Default", "score": 50})
          print(f"  ✅ Thêm {len(sites)} web")
          
          print(f"📊 TỔNG WEB TÌM ĐƯỢC: {len(all_targets)}")
          all_targets.sort(key=lambda x: x["score"], reverse=True)
          target_count = 150
          top = all_targets[:target_count*2]
          
          print("🔍 KIỂM TRA WEB CÒN SỐNG...")
          alive = []
          for t in top:
              if len(alive) >= target_count: break
              url = f"https://{t['domain']}"
              try:
                  code = subprocess.run(["curl","-s","-o","/dev/null","-w","%{http_code}",url], capture_output=True, text=True, timeout=5).stdout.strip()
                  if code in ["200","301","302","403"]:
                      alive.append(t); print(f"  ✅ {url}")
                  else:
                      print(f"  ❌ {url} - HTTP {code}")
              except:
                  print(f"  ⚠️ {url}")
          
          print(f"📊 WEB CÒN SỐNG: {len(alive)}/{target_count}")
          with open("targets.txt", "w") as f:
              for t in alive: f.write(f"https://{t['domain']}\n")
          with open("targets_analysis.json", "w") as f:
              json.dump(alive, f, indent=2)
          print(f"✅ ĐÃ CHỌN {len(alive)} WEB")
          EOF
          
          python3 /tmp/finder.py
          
          TARGET_COUNT=$(wc -l < targets.txt 2>/dev/null || echo 0)
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          if [ "$TARGET_COUNT" -eq 0 ]; then
              echo "⚠️ DÙNG DANH SÁCH DỰ PHÒNG..."
              printf "https://google.com\nhttps://facebook.com\nhttps://twitter.com\nhttps://linkedin.com\nhttps://reddit.com\nhttps://netflix.com\nhttps://amazon.com\nhttps://microsoft.com\nhttps://apple.com\nhttps://adobe.com\n" > targets.txt
              TARGET_COUNT=10
              echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          fi
          
          echo "🎯 SỐ WEB: $TARGET_COUNT"
          head -10 targets.txt

      - name: 🔍 QUÉT LỖ HỔNG NÂNG CAO
        timeout-minutes: 420
        run: |
          echo "🔍 CHIP V18.3 - QUÉT LỖ HỔNG NÂNG CAO..."
          
          export PATH=$PATH:/usr/local/go/bin
          
          case "${{ github.event.inputs.scan_mode }}" in
            fast)  CONCURRENCY=120; BULK_SIZE=60; RATE_LIMIT=100; TIMEOUT=10; RETRIES=3 ;;
            deep)  CONCURRENCY=40;  BULK_SIZE=20; RATE_LIMIT=30;  TIMEOUT=35; RETRIES=6 ;;
            ultimate) CONCURRENCY=80; BULK_SIZE=40; RATE_LIMIT=50; TIMEOUT=25; RETRIES=5 ;;
            *)     CONCURRENCY=60;  BULK_SIZE=30; RATE_LIMIT=40; TIMEOUT=20; RETRIES=4 ;;
          esac
          
          if [ -z "${{ github.event.inputs.severity_level }}" ]; then
            SEVERITY="critical,high,medium,low,info"
          else
            SEVERITY="${{ github.event.inputs.severity_level }}"
          fi
          
          nuclei -list targets.txt -severity "$SEVERITY" \
            -t ~/nuclei-templates/ \
            -t ~/nuclei-templates/all/ \
            -t ~/nuclei-templates/nuclei-templates/ \
            -t ~/nuclei-templates/geeknik/ \
            -t ~/nuclei-templates/extra/ \
            -t ~/nuclei-templates/random/ \
            -t ~/nuclei-templates/zero/ \
            -t ~/nuclei-templates/gwen001/ \
            -t ~/nuclei-templates/dhiyaneshdk/ \
            -t ~/nuclei-templates/pikpikcu/ \
            -t ~/nuclei-templates/ehsandeep/ \
            -t ~/nuclei-templates/ddworken/ \
            -t ~/nuclei-templates/s0md3v/ \
            -t ~/nuclei-templates/r3naissance/ \
            -t ~/nuclei-templates/loneferret/ \
            -t ~/nuclei-templates/initstring/ \
            -t ~/nuclei-templates/codingo/ \
            -c $CONCURRENCY -bulk-size $BULK_SIZE -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT -retries $RETRIES -max-redirects 15 -follow-redirects \
            -stats -stats-interval 15 -rdb report.db -json-export results.json \
            -jle results.jsonl -o results.txt -no-interactsh -disable-update-check \
            -max-host-error 20 -no-mhe -silent -no-color 2>&1 | tee scan.log
          
          echo "=================================================="
          echo "📊 KẾT QUẢ QUÉT:"
          echo "=================================================="
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG LỖI: $TOTAL"
          if [ -f results.json ]; then
              echo "🔥 CRITICAL: $(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)"
              echo "⚡ HIGH: $(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)"
              echo "🟡 MEDIUM: $(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)"
              echo "🟢 LOW: $(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)"
              echo "ℹ️ INFO: $(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)"
          fi
          echo "=================================================="

      - name: 📄 BÁO CÁO SIÊU CHI TIẾT (TEXT + HTML)
        if: always()
        run: |
          echo "🧠 CHIP V18.3 - ĐANG TẠO BÁO CÁO SIÊU CHI TIẾT..."
          
          TOTAL=$(jq -s 'length' results.json 2>/dev/null || echo 0)
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          LOW=$(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)
          INFO=$(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)
          TARGET_COUNT=$(cat targets.txt 2>/dev/null | wc -l || echo 0)
          
          ESTIMATED_BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200 + LOW * 50))
          RISK_SCORE=$((CRITICAL * 10 + HIGH * 5 + MEDIUM * 2))
          
          if [ $RISK_SCORE -gt 80 ]; then RISK_LEVEL="🔴 CỰC KỲ NGUY HIỂM"
          elif [ $RISK_SCORE -gt 50 ]; then RISK_LEVEL="🟠 RẤT NGUY HIỂM"
          elif [ $RISK_SCORE -gt 25 ]; then RISK_LEVEL="🟡 NGUY HIỂM"
          elif [ $RISK_SCORE -gt 10 ]; then RISK_LEVEL="🟢 THẤP"
          else RISK_LEVEL="⚪ RẤT THẤP"; fi
          
          # ---- BÁO CÁO TEXT ----
          cat > CHIP_V18_REPORT.txt << EOF
          ╔══════════════════════════════════════════════════════════════════════════════╗
          ║     🧠 CHIP V18.3 - BÁO CÁO SIÊU CHI TIẾT - ĐẦY ĐỦ TÍNH NĂNG              ║
          ╚══════════════════════════════════════════════════════════════════════════════╝
          
          📅 $(date '+%Y-%m-%d %H:%M:%S') | 🔄 #${{ github.run_number }} | 🎯 $TARGET_COUNT web
          
          ════════════════════════════════════════════════════════════════════════════════
          📊 TỔNG QUAN
          ════════════════════════════════════════════════════════════════════════════════
          📦 TỔNG LỖI: $TOTAL
          🔥 CRITICAL: $CRITICAL  (💰 \$5,000+/lỗi)
          ⚡ HIGH: $HIGH          (💰 \$1,000+/lỗi)
          🟡 MEDIUM: $MEDIUM      (💰 \$200+/lỗi)
          🟢 LOW: $LOW            (💰 \$50+/lỗi)
          ℹ️ INFO: $INFO          (💰 Có giá trị tham khảo)
          
          ════════════════════════════════════════════════════════════════════════════════
          💰 PHÂN TÍCH GIÁ TRỊ
          ════════════════════════════════════════════════════════════════════════════════
          📊 RISK SCORE: $RISK_SCORE
          ⚠️ RISK LEVEL: $RISK_LEVEL
          💰 BOUNTY: \$$(printf "%'d" $ESTIMATED_BOUNTY)
          
          ════════════════════════════════════════════════════════════════════════════════
          💰💰💰 LỖI CÓ GIÁ TRỊ TIỀN (CRITICAL + HIGH + MEDIUM)
          ════════════════════════════════════════════════════════════════════════════════
          TỔNG LỖI CÓ TIỀN: $((CRITICAL + HIGH + MEDIUM))
          ┌──────┬────────────┬────────────────────────────────────────────────────────────┬────────────┬──────────┐
          │  #   │ MỨC ĐỘ    │ TÊN LỖI                                                   │ BOUNTY     │ TRẠNG THÁI│
          ├──────┼────────────┼────────────────────────────────────────────────────────────┼────────────┼──────────┤
          EOF
          
          COUNTER=1
          jq -r 'select(.info.severity=="critical" or .info.severity=="high" or .info.severity=="medium") | 
            "│ " + (if .info.severity=="critical" then "🔥" elif .info.severity=="high" then "⚡" else "🟡" end) + 
            " │ " + .info.severity + 
            " │ " + (.info.name[0:55]) + 
            " │ $" + (if .info.severity=="critical" then "5,000+" elif .info.severity=="high" then "1,000+" else "200+" end) + 
            " │ CHƯA VÁ │"' results.json 2>/dev/null | head -200 | while read line; do
            printf "│ %4s │ %s\n" "$COUNTER" "$line" >> CHIP_V18_REPORT.txt
            COUNTER=$((COUNTER+1))
          done
          
          echo "└──────┴────────────┴────────────────────────────────────────────────────────────┴────────────┴──────────┘" >> CHIP_V18_REPORT.txt
          
          echo "" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "📋📋📋 LỖI KHÔNG CÓ GIÁ TRỊ TIỀN (LOW + INFO)" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "TỔNG LỖI KHÔNG TIỀN: $((LOW + INFO))" >> CHIP_V18_REPORT.txt
          echo "" >> CHIP_V18_REPORT.txt
          if [ $LOW -gt 0 ]; then
            echo "🟢 LOW ($LOW lỗi):" >> CHIP_V18_REPORT.txt
            jq -r 'select(.info.severity=="low") | "  - " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> CHIP_V18_REPORT.txt
          fi
          if [ $INFO -gt 0 ]; then
            echo "" >> CHIP_V18_REPORT.txt
            echo "ℹ️ INFO ($INFO lỗi):" >> CHIP_V18_REPORT.txt
            jq -r 'select(.info.severity=="info") | "  - " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> CHIP_V18_REPORT.txt
          fi
          
          echo "" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "🔗🔗🔗 DANH SÁCH CVE" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          CVE_COUNT=$(jq -r 'select(.info.cve_id != null) | .info.cve_id' results.json 2>/dev/null | wc -l || echo 0)
          echo "TỔNG CVE: $CVE_COUNT" >> CHIP_V18_REPORT.txt
          echo "" >> CHIP_V18_REPORT.txt
          jq -r 'select(.info.cve_id != null) | "📌 " + .info.cve_id + " - " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -100 >> CHIP_V18_REPORT.txt
          
          echo "" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "📡📡📡 NGUỒN DỮ LIỆU WEB" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "🌍 HackerOne, Bugcrowd, Immunefi, Top1M, Default" >> CHIP_V18_REPORT.txt
          echo "🔄 CẬP NHẬT: Mỗi 30 phút" >> CHIP_V18_REPORT.txt
          
          echo "" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "🌐🌐🌐 DANH SÁCH WEB ĐÃ QUÉT" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          cat targets.txt >> CHIP_V18_REPORT.txt
          
          echo "" >> CHIP_V18_REPORT.txt
          echo "╔══════════════════════════════════════════════════════════════════════════════╗" >> CHIP_V18_REPORT.txt
          echo "║        ✅ BÁO CÁO HOÀN TẤT - CHIP V18.3                                   ║" >> CHIP_V18_REPORT.txt
          echo "║  💰 \$$(printf "%'d" $ESTIMATED_BOUNTY)  |  ⚠️ $RISK_LEVEL                ║" >> CHIP_V18_REPORT.txt
          echo "║  📦 TỔNG LỖI: $TOTAL  |  🔥 CÓ TIỀN: $((CRITICAL + HIGH + MEDIUM))       ║" >> CHIP_V18_REPORT.txt
          echo "╚══════════════════════════════════════════════════════════════════════════════╝" >> CHIP_V18_REPORT.txt
          
          echo "✅ BÁO CÁO HOÀN TẤT!"
          head -60 CHIP_V18_REPORT.txt
          
          # ---- BÁO CÁO HTML ----
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>CHIP V18.3 REPORT</title>' > report.html
          echo '<style>
          body{font-family:Segoe UI;background:linear-gradient(135deg,#0a0a2e,#1a1a4e);color:#fff;padding:20px}
          .container{max-width:1200px;margin:0 auto;background:rgba(255,255,255,0.05);border-radius:20px;padding:30px}
          h1{text-align:center;background:linear-gradient(45deg,#ff6b6b,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2.5em}
          .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:15px;margin:20px 0}
          .card{background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;text-align:center;border:1px solid rgba(255,255,255,0.1)}
          .card .num{font-size:2.5em;font-weight:bold;display:block}
          .critical .num{color:#ff4444} .high .num{color:#ff8800} .medium .num{color:#ffcc00}
          .low .num{color:#44ff88} .info .num{color:#44aaff} .total .num{color:#fff}
          .vuln{background:rgba(255,255,255,0.05);border-radius:8px;padding:12px;margin:8px 0;border-left:4px solid #666}
          .vuln.critical{border-left-color:#ff4444} .vuln.high{border-left-color:#ff8800} .vuln.medium{border-left-color:#ffcc00}
          .targets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
          .target{background:rgba(255,255,255,0.05);padding:8px;border-radius:5px;font-size:0.85em;border:1px solid rgba(255,255,255,0.05)}
          .footer{text-align:center;color:#666;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05)}
          h2{color:#ffd700;border-bottom:2px solid rgba(255,215,0,0.3);padding-bottom:10px}
          @media(max-width:768px){.stats{grid-template-columns:repeat(3,1fr)}}
          </style></head><body><div class="container">' >> report.html
          
          echo '<h1>🧠 CHIP V18.3 - ĐẦY ĐỦ TÍNH NĂNG</h1>' >> report.html
          echo '<p style="text-align:center;color:#aaa;">Báo cáo quét bảo mật tự động</p>' >> report.html
          echo '<p style="text-align:center;color:#888;">📅 '"$(date '+%Y-%m-%d %H:%M:%S')"' | 🎯 '"$TARGET_COUNT"' web</p>' >> report.html
          
          echo '<div class="stats">' >> report.html
          echo '<div class="card critical"><span class="num">'"$CRITICAL"'</span>🔥 CRITICAL</div>' >> report.html
          echo '<div class="card high"><span class="num">'"$HIGH"'</span>⚡ HIGH</div>' >> report.html
          echo '<div class="card medium"><span class="num">'"$MEDIUM"'</span>🟡 MEDIUM</div>' >> report.html
          echo '<div class="card low"><span class="num">'"$LOW"'</span>🟢 LOW</div>' >> report.html
          echo '<div class="card info"><span class="num">'"$INFO"'</span>ℹ️ INFO</div>' >> report.html
          echo '<div class="card total"><span class="num">'"$TOTAL"'</span>📦 TỔNG</div>' >> report.html
          echo '</div>' >> report.html
          
          echo '<div style="background:rgba(255,215,0,0.1);border-radius:10px;padding:15px;margin:15px 0;text-align:center;border:1px solid rgba(255,215,0,0.2)">' >> report.html
          echo '<p>💰 Bounty: <strong style="color:#ffd700;font-size:1.5em">$'"$(printf "%'d" $ESTIMATED_BOUNTY)"'</strong> | ⚠️ Risk: <strong style="color:#ff6b6b;font-size:1.3em">'"$RISK_LEVEL"'</strong></p>' >> report.html
          echo '</div>' >> report.html
          
          if [ $CRITICAL -gt 0 ]; then
            echo '<h2>🔥 CRITICAL</h2>' >> report.html
            jq -r 'select(.info.severity=="critical") | "<div class=\"vuln critical\"><b>" + .info.name + "</b><br>📍 " + .matched-at + "<br>🔗 CVE: " + (.info.cve_id // "N/A") + "</div>"' results.json 2>/dev/null >> report.html
          fi
          if [ $HIGH -gt 0 ]; then
            echo '<h2>⚡ HIGH</h2>' >> report.html
            jq -r 'select(.info.severity=="high") | "<div class=\"vuln high\"><b>" + .info.name + "</b><br>📍 " + .matched-at + "<br>🔗 CVE: " + (.info.cve_id // "N/A") + "</div>"' results.json 2>/dev/null >> report.html
          fi
          if [ $MEDIUM -gt 0 ]; then
            echo '<h2>🟡 MEDIUM</h2>' >> report.html
            jq -r 'select(.info.severity=="medium") | "<div class=\"vuln medium\"><b>" + .info.name + "</b><br>📍 " + .matched-at + "<br>🔗 CVE: " + (.info.cve_id // "N/A") + "</div>"' results.json 2>/dev/null >> report.html
          fi
          
          echo '<h2>📋 DANH SÁCH WEB</h2><div class="targets">' >> report.html
          while read url; do echo "<div class=\"target\">🌐 $url</div>"; done < targets.txt >> report.html
          echo '</div><div class="footer">🧠 CHỦ NHÂN VŨ TRỤ | CHIP V18.3</div></div></body></html>' >> report.html
          
          echo "✅ BÁO CÁO HTML HOÀN TẤT!"

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chip-v18-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            CHIP_V18_REPORT.txt
            report.html
            targets.txt
            targets_analysis.json
            scan.log
          retention-days: 90
