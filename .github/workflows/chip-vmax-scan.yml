name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V18.7 LỌC VÀNG"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '200x'
        type: choice
        options:
          - 100x
          - 200x
          - 500x
      target_count:
        description: '🎯 SỐ WEB CẦN CHỌN'
        required: false
        default: '200'
        type: choice
        options:
          - 100
          - 200
          - 300
          - 500
  schedule:
    - cron: '*/15 * * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: 🧠 KHỞI TẠO
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║     🧠 CHIP V18.7 - LỌC VÀNG - TÌM 200 WEB CÓ GIÁ TRỊ CAO NHẤT           ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo "🎯 MỤC TIÊU: 200 WEB GIÁ TRỊ CAO NHẤT"
          echo "💰 MỤC ĐÍCH: TÍCH LŨY TIỀN TỪ TỪ, KHÔNG BÙNG NỔ MỘT LẦN"
          echo "🔄 CẬP NHẬT: 15 PHÚT/LẦN"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends jq curl git python3 python3-pip unzip wget
          sudo rm -rf /var/lib/apt/lists/*
          
          wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          pip3 install -q requests beautifulsoup4 lxml
          
          for i in 1 2 3; do nuclei -update-templates -silent && break || sleep 5; done
          
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          git clone --depth 1 -q https://github.com/projectdiscovery/nuclei-templates.git official 2>/dev/null || true
          git clone --depth 1 -q https://github.com/geeknik/nuclei-templates.git geeknik 2>/dev/null || true
          git clone --depth 1 -q https://github.com/notnotnotveg/nuclei-templates.git extra 2>/dev/null || true
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 🌍 TỰ ĐỘNG TÌM 200 WEB GIÁ TRỊ CAO NHẤT
        id: find_targets
        run: |
          echo "🌍 ĐANG QUÉT HÀNG TỶ WEB + HACKERONE + BUGCROWD + IMMUNEFI..."
          echo "🎯 MỤC TIÊU: TÌM ĐÚNG 200 WEB CÓ GIÁ TRỊ CAO NHẤT"
          echo ""
          
          cat > /tmp/finder.py << "EOF"
          import json, requests, subprocess, re, time
          
          print("🧠 CHIP V18.7 - LỌC VÀNG")
          print("🔍 ĐANG QUÉT HÀNG TỶ WEB TOÀN CẦU...")
          
          all_targets = []
          seen = set()
          
          # === 1. HACKERONE ===
          print("📥 1. HACKERONE...")
          try:
              r = requests.get("https://hackerone.com/programs/search?query=type:public", timeout=30)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'hackerone' not in d and 'example' not in d:
                      seen.add(d)
                      all_targets.append({"domain": d, "source": "HackerOne", "score": 95, "bounty": 5000})
          except: pass
          print(f"  ✅ {len(all_targets)} web")
          
          # === 2. BUGCROWD ===
          print("📥 2. BUGCROWD...")
          try:
              r = requests.get("https://bugcrowd.com/programs", timeout=30)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'bugcrowd' not in d and 'example' not in d:
                      seen.add(d)
                      all_targets.append({"domain": d, "source": "Bugcrowd", "score": 90, "bounty": 3000})
          except: pass
          print(f"  ✅ {len(all_targets)} web")
          
          # === 3. IMMUNEFI ===
          print("📥 3. IMMUNEFI...")
          try:
              r = requests.get("https://immunefi.com/explore/", timeout=30)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'immunefi' not in d and 'example' not in d:
                      seen.add(d)
                      all_targets.append({"domain": d, "source": "Immunefi", "score": 98, "bounty": 10000})
          except: pass
          print(f"  ✅ {len(all_targets)} web")
          
          # === 4. TOP 1M - HÀNG TRIỆU WEB ===
          print("📥 4. TOP 1M WEBSITES...")
          try:
              r = requests.get("https://raw.githubusercontent.com/mehulj94/top-1m/master/top-1m.txt", timeout=30)
              if r.status_code == 200:
                  count = 0
                  for line in r.text.splitlines()[:10000]:
                      d = line.strip().lower()
                      if d and '.' in d and d not in seen:
                          score = 20
                          bounty = 0
                          if any(k in d for k in ["bank","finance","pay","payment"]): score += 40; bounty = 5000
                          if any(k in d for k in ["crypto","blockchain","defi","eth","bitcoin"]): score += 45; bounty = 10000
                          if any(k in d for k in ["gov","government","state"]): score += 35; bounty = 3000
                          if any(k in d for k in ["api","gateway","auth","login","admin"]): score += 30; bounty = 1500
                          if any(k in d for k in ["shop","store","cart","checkout"]): score += 20; bounty = 800
                          if d.endswith(".gov") or d.endswith(".edu"): score += 15; bounty += 500
                          if len(d) < 10: score += 5
                          if d.count(".") > 1: score += 8
                          
                          # Nếu có từ khóa giá trị cao, ưu tiên
                          if any(k in d for k in ["bank","crypto","blockchain","gov"]):
                              score += 20
                              bounty *= 2
                          
                          if score > 30:
                              seen.add(d)
                              all_targets.append({"domain": d, "source": "Top1M", "score": score, "bounty": bounty})
                              count += 1
                  print(f"  ✅ Lấy {count} web từ Top1M")
          except: pass
          
          # === SẮP XẾP THEO GIÁ TRỊ ===
          all_targets.sort(key=lambda x: (x["score"], x["bounty"]), reverse=True)
          
          print(f"\n📊 TỔNG WEB TÌM ĐƯỢC: {len(all_targets)}")
          
          # Lấy 500 web tốt nhất để kiểm tra sống
          target = 200
          top = all_targets[:500]
          
          # === KIỂM TRA WEB SỐNG (LẤY ĐỦ 200) ===
          print("\n🔍 KIỂM TRA WEB CÒN SỐNG VÀ CHỌN 200 WEB GIÁ TRỊ NHẤT...")
          alive = []
          
          for t in top:
              if len(alive) >= target:
                  break
              url = f"https://{t['domain']}"
              try:
                  c = subprocess.run(["curl","-s","-o","/dev/null","-w","%{http_code}",url], capture_output=True, text=True, timeout=5).stdout.strip()
                  if c in ["200","301","302","403"]:
                      alive.append(t)
                      print(f"  ✅ {url} - {t['source']} - Điểm: {t['score']} - Bounty: ${t['bounty']}")
                  else:
                      print(f"  ❌ {url} - HTTP {c}")
              except:
                  print(f"  ⚠️ {url} - TIMEOUT")
          
          print(f"\n📊 WEB CÒN SỐNG: {len(alive)}/{target}")
          
          # === NẾU CHƯA ĐỦ 200, LẤY THÊM TỪ DANH SÁCH DỰ PHÒNG ===
          if len(alive) < target:
              print(f"\n⚠️ CHỈ CÓ {len(alive)} WEB SỐNG! LẤY THÊM TỪ DANH SÁCH DỰ PHÒNG...")
              backup = [
                  "stripe.com", "paypal.com", "shopify.com", "github.com", "gitlab.com",
                  "vietnamnet.vn", "zingnews.vn", "tiki.vn", "shopee.vn", "fpt.vn",
                  "viettel.vn", "thegioididong.com", "vnexpress.net", "dantri.com.vn",
                  "chinhphu.vn", "mof.gov.vn", "mic.gov.vn", "moit.gov.vn",
                  "wordpress.com", "drupal.org", "joomla.org", "magento.com",
                  "laravel.com", "djangoproject.com", "rubyonrails.org", "symfony.com"
              ]
              for d in backup:
                  if len(alive) >= target:
                      break
                  url = f"https://{d}"
                  try:
                      c = subprocess.run(["curl","-s","-o","/dev/null","-w","%{http_code}",url], capture_output=True, text=True, timeout=5).stdout.strip()
                      if c in ["200","301","302","403"]:
                          alive.append({"domain": d, "source": "Backup", "score": 50, "bounty": 500})
                          print(f"  ✅ {url} - Backup")
                  except: pass
          
          print(f"\n📊 WEB CUỐI CÙNG: {len(alive)}/{target}")
          
          # === LƯU FILE ===
          with open("targets.txt", "w") as f:
              for t in alive:
                  f.write(f"https://{t['domain']}\n")
          
          with open("targets_analysis.json", "w") as f:
              json.dump(alive, f, indent=2)
          
          # === HIỂN THỊ TOP 30 ===
          print("\n" + "="*80)
          print("🏆 TOP 30 WEB GIÁ TRỊ CAO NHẤT:")
          print("="*80)
          for i, t in enumerate(alive[:30], 1):
              print(f"{i:2}. {t['domain']} - Điểm: {t['score']} - Bounty: ${t['bounty']:,} - {t['source']}")
          
          print("\n" + "="*80)
          print(f"✅ ĐÃ CHỌN {len(alive)} WEB TỪ HÀNG TỶ TRANG")
          print("="*80)
          EOF
          
          python3 /tmp/finder.py
          
          TARGET_COUNT=$(wc -l < targets.txt 2>/dev/null || echo 0)
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          if [ "$TARGET_COUNT" -lt 50 ]; then
              echo "❌ QUÁ ÍT WEB! DÙNG DANH SÁCH DỰ PHÒNG..."
              cat > targets.txt << 'EOF'
              https://stripe.com
              https://paypal.com
              https://shopify.com
              https://github.com
              https://gitlab.com
              https://vietnamnet.vn
              https://zingnews.vn
              https://tiki.vn
              https://shopee.vn
              https://fpt.vn
              https://viettel.vn
              https://thegioididong.com
              https://vnexpress.net
              https://dantri.com.vn
              https://chinhphu.vn
              https://mof.gov.vn
              https://mic.gov.vn
              https://moit.gov.vn
              https://wordpress.com
              https://drupal.org
              https://joomla.org
              https://magento.com
              https://laravel.com
              https://djangoproject.com
              https://rubyonrails.org
              https://symfony.com
              EOF
              TARGET_COUNT=$(wc -l < targets.txt)
              echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          fi
          
          echo "🎯 SỐ WEB CUỐI CÙNG: $TARGET_COUNT"
          echo "📋 DANH SÁCH WEB (15 MỤC ĐẦU):"
          head -15 targets.txt

      - name: 🔍 QUÉT LỖ HỔNG
        timeout-minutes: 420
        run: |
          echo "🔍 QUÉT LỖ HỔNG TRÊN ${{ env.target_count }} WEB GIÁ TRỊ CAO..."
          export PATH=$PATH:/usr/local/go/bin
          CONCURRENCY=80
          BULK_SIZE=40
          RATE_LIMIT=60
          TIMEOUT=25
          RETRIES=5
          MAX_REDIRECTS=15
          SEVERITY="critical,high,medium"
          
          nuclei -list targets.txt -severity "$SEVERITY" \
            -t ~/nuclei-templates/ -t ~/nuclei-templates/official/ -t ~/nuclei-templates/geeknik/ -t ~/nuclei-templates/extra/ \
            -c $CONCURRENCY -bulk-size $BULK_SIZE -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT -retries $RETRIES -max-redirects $MAX_REDIRECTS -follow-redirects \
            -stats -stats-interval 15 -rdb report.db -json-export results.json \
            -jle results.jsonl -o results.txt -no-interactsh -disable-update-check \
            -max-host-error 20 -no-mhe -silent -no-color 2>&1 | tee scan.log
          
          echo "=================================================="
          echo "📊 KẾT QUẢ QUÉT:"
          echo "=================================================="
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG LỖI CÓ TIỀN: $TOTAL"
          if [ -f results.json ]; then
              CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
              HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
              MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
              echo "🔥 CRITICAL: $CRITICAL (💰 \$5,000+ mỗi lỗi)"
              echo "⚡ HIGH: $HIGH (💰 \$1,000+ mỗi lỗi)"
              echo "🟡 MEDIUM: $MEDIUM (💰 \$200+ mỗi lỗi)"
          fi
          echo "=================================================="

      - name: 📄 BÁO CÁO - CHI TIẾT LỖI CÓ TIỀN
        if: always()
        run: |
          TOTAL=$(jq -s 'length' results.json 2>/dev/null || echo 0)
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          TARGET_COUNT=$(cat targets.txt 2>/dev/null | wc -l || echo 0)
          BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200))
          
          cat > REPORT.txt << EOF
          ╔══════════════════════════════════════════════════════════════════════════════╗
          ║     🧠 CHIP V18.7 - BÁO CÁO TÍCH LŨY TIỀN TỪ TỪ                         ║
          ╚══════════════════════════════════════════════════════════════════════════════╝
          
          📅 $(date '+%Y-%m-%d %H:%M:%S')
          🎯 SỐ WEB ĐÃ QUÉT: $TARGET_COUNT
          🌍 NGUỒN: HackerOne + Bugcrowd + Immunefi + Top1M
          🔄 CẬP NHẬT: 15 PHÚT/LẦN
          
          ════════════════════════════════════════════════════════════════════════════════
          💰 KẾT QUẢ TÍCH LŨY TIỀN
          ════════════════════════════════════════════════════════════════════════════════
          
          📦 TỔNG LỖI CÓ TIỀN: $TOTAL
          🔥 CRITICAL: $CRITICAL lỗi × \$5,000 = \$$((CRITICAL * 5000))
          ⚡ HIGH: $HIGH lỗi × \$1,000 = \$$((HIGH * 1000))
          🟡 MEDIUM: $MEDIUM lỗi × \$200 = \$$((MEDIUM * 200))
          
          💰 TỔNG BOUNTY HÔM NAY: \$$(printf "%'d" $BOUNTY)
          
          ════════════════════════════════════════════════════════════════════════════════
          📋 CHI TIẾT LỖI CRITICAL + HIGH + MEDIUM
          ════════════════════════════════════════════════════════════════════════════════
          EOF
          
          if [ $TOTAL -gt 0 ]; then
              jq -r 'select(.info.severity=="critical" or .info.severity=="high" or .info.severity=="medium") | 
                "📌 " + .info.name + " → " + .matched-at + " | " + .info.severity + " | CVE: " + (.info.cve_id // "N/A")' results.json 2>/dev/null >> REPORT.txt
          else
              echo "✅ CHƯA CÓ LỖI NÀO HÔM NAY - TIẾP TỤC TÍCH LŨY!" >> REPORT.txt
          fi
          
          echo "" >> REPORT.txt
          echo "╔══════════════════════════════════════════════════════════════════════════════╗" >> REPORT.txt
          echo "║        💰 TÍCH LŨY TỪ TỪ - GIÀU LÊN MỖI NGÀY                            ║" >> REPORT.txt
          echo "║        🎯 MỤC TIÊU: LỖI CÓ GIÁ TRỊ TIỀN - KHÔNG LÃNG PHÍ THỜI GIAN      ║" >> REPORT.txt
          echo "╚══════════════════════════════════════════════════════════════════════════════╝" >> REPORT.txt
          
          echo "✅ BÁO CÁO HOÀN TẤT!"
          cat REPORT.txt

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chip-v18-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            REPORT.txt
            targets.txt
            targets_analysis.json
            scan.log
          retention-days: 90
