name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V18.6 FINAL"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '100x'
        type: choice
        options:
          - 50x
          - 100x
          - 200x
      target_count:
        description: '🎯 SỐ WEB CẦN CHỌN'
        required: false
        default: '200'
        type: choice
        options:
          - 100
          - 200
          - 300
          - 500
  schedule:
    - cron: '*/15 * * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: 🧠 KHỞI TẠO
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║     🧠 CHIP V18.6 - TỰ ĐỘNG TÌM WEB TOÀN CẦU - CẬP NHẬT 15 PHÚT          ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo "🎯 SỐ WEB: ${{ github.event.inputs.target_count || '200' }}"
          echo "🔄 CẬP NHẬT: 15 PHÚT/LẦN"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends jq curl git python3 python3-pip unzip wget
          sudo rm -rf /var/lib/apt/lists/*
          
          wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          pip3 install -q requests beautifulsoup4 lxml
          
          for i in 1 2 3; do nuclei -update-templates -silent && break || sleep 5; done
          
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          git clone --depth 1 -q https://github.com/projectdiscovery/nuclei-templates.git official 2>/dev/null || true
          git clone --depth 1 -q https://github.com/geeknik/nuclei-templates.git geeknik 2>/dev/null || true
          git clone --depth 1 -q https://github.com/notnotnotveg/nuclei-templates.git extra 2>/dev/null || true
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 🌍 TỰ ĐỘNG TÌM WEB TOÀN CẦU
        id: find_targets
        run: |
          echo "🌍 ĐANG QUÉT HÀNG TỶ WEB + HACKERONE + BUGCROWD + IMMUNEFI..."
          
          cat > /tmp/finder.py << "EOF"
          import json, requests, subprocess, re
          print("🧠 AUTO FINDER - QUÉT TOÀN CẦU")
          all_targets, seen = [], set()
          
          # HACKERONE
          try:
              r = requests.get("https://hackerone.com/programs/search?query=type:public", timeout=20)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'hackerone' not in d:
                      seen.add(d); all_targets.append({"domain": d, "source": "HackerOne", "score": 95})
          except: pass
          
          # BUGCROWD
          try:
              r = requests.get("https://bugcrowd.com/programs", timeout=20)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'bugcrowd' not in d:
                      seen.add(d); all_targets.append({"domain": d, "source": "Bugcrowd", "score": 90})
          except: pass
          
          # IMMUNEFI
          try:
              r = requests.get("https://immunefi.com/explore/", timeout=20)
              for part in re.findall(r'[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}', r.text):
                  d = part.lower()
                  if d not in seen and len(d) > 3 and 'immunefi' not in d:
                      seen.add(d); all_targets.append({"domain": d, "source": "Immunefi", "score": 98})
          except: pass
          
          # TOP 1M - HÀNG TRIỆU WEB
          try:
              r = requests.get("https://raw.githubusercontent.com/mehulj94/top-1m/master/top-1m.txt", timeout=20)
              if r.status_code == 200:
                  count = 0
                  for line in r.text.splitlines()[:3000]:
                      d = line.lower()
                      if d and '.' in d and d not in seen:
                          s = 20
                          if any(k in d for k in ["bank","finance","pay"]): s += 35
                          if any(k in d for k in ["crypto","blockchain","defi"]): s += 40
                          if any(k in d for k in ["gov","government"]): s += 30
                          if any(k in d for k in ["api","auth","login","admin"]): s += 25
                          if d.endswith(".gov") or d.endswith(".edu"): s += 15
                          if s > 30:
                              seen.add(d); all_targets.append({"domain": d, "source": "Top1M", "score": s}); count += 1
          except: pass
          
          print(f"📊 TỔNG WEB TÌM: {len(all_targets)}")
          all_targets.sort(key=lambda x: x["score"], reverse=True)
          
          target = 200
          top = all_targets[:target*2]
          alive = []
          
          print("🔍 KIỂM TRA WEB SỐNG...")
          for t in top:
              if len(alive) >= target: break
              url = f"https://{t['domain']}"
              try:
                  c = subprocess.run(["curl","-s","-o","/dev/null","-w","%{http_code}",url], capture_output=True, text=True, timeout=5).stdout.strip()
                  if c in ["200","301","302","403"]:
                      alive.append(t); print(f"  ✅ {url}")
              except: pass
          
          print(f"📊 WEB SỐNG: {len(alive)}/{target}")
          with open("targets.txt", "w") as f:
              for t in alive: f.write(f"https://{t['domain']}\n")
          with open("targets_analysis.json", "w") as f:
              json.dump(alive, f, indent=2)
          
          print(f"✅ ĐÃ CHỌN {len(alive)} WEB TỪ HÀNG TỶ TRANG")
          EOF
          
          python3 /tmp/finder.py
          
          TARGET_COUNT=$(wc -l < targets.txt 2>/dev/null || echo 0)
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          if [ "$TARGET_COUNT" -eq 0 ]; then
              echo "❌ KHÔNG TÌM THẤY WEB! THOÁT..."
              exit 1
          fi
          
          echo "🎯 SỐ WEB: $TARGET_COUNT"
          head -10 targets.txt

      - name: 🔍 QUÉT LỖ HỔNG
        timeout-minutes: 420
        run: |
          echo "🔍 QUÉT LỖ HỔNG TRÊN ${{ env.target_count }} WEB..."
          export PATH=$PATH:/usr/local/go/bin
          CONCURRENCY=60; BULK_SIZE=30; RATE_LIMIT=50; TIMEOUT=20; RETRIES=4; MAX_REDIRECTS=12
          SEVERITY="critical,high,medium,low,info"
          
          nuclei -list targets.txt -severity "$SEVERITY" \
            -t ~/nuclei-templates/ -t ~/nuclei-templates/official/ -t ~/nuclei-templates/geeknik/ -t ~/nuclei-templates/extra/ \
            -c $CONCURRENCY -bulk-size $BULK_SIZE -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT -retries $RETRIES -max-redirects $MAX_REDIRECTS -follow-redirects \
            -stats -stats-interval 15 -rdb report.db -json-export results.json \
            -jle results.jsonl -o results.txt -no-interactsh -disable-update-check \
            -max-host-error 20 -no-mhe -silent -no-color 2>&1 | tee scan.log
          
          echo "📊 KẾT QUẢ:"
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG LỖI: $TOTAL"
          if [ -f results.json ]; then
              echo "🔥 CRITICAL: $(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)"
              echo "⚡ HIGH: $(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)"
              echo "🟡 MEDIUM: $(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)"
          fi

      - name: 📄 BÁO CÁO
        if: always()
        run: |
          TOTAL=$(jq -s 'length' results.json 2>/dev/null || echo 0)
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          TARGET_COUNT=$(cat targets.txt 2>/dev/null | wc -l || echo 0)
          BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200))
          
          cat > REPORT.txt << EOF
          ╔══════════════════════════════════════════════════════════════════════════════╗
          ║     🧠 CHIP V18.6 - BÁO CÁO TỰ ĐỘNG TÌM WEB TOÀN CẦU                      ║
          ╚══════════════════════════════════════════════════════════════════════════════╝
          📅 $(date '+%Y-%m-%d %H:%M:%S')
          🎯 SỐ WEB: $TARGET_COUNT (từ hàng tỷ web + HackerOne, Bugcrowd, Immunefi)
          🔄 CẬP NHẬT: 15 PHÚT/LẦN
          📦 TỔNG LỖI: $TOTAL
          🔥 CRITICAL: $CRITICAL (💰 \$5,000+)
          ⚡ HIGH: $HIGH (💰 \$1,000+)
          🟡 MEDIUM: $MEDIUM (💰 \$200+)
          💰 BOUNTY: \$$(printf "%'d" $BOUNTY)
          ✅ BÁO CÁO HOÀN TẤT!
          EOF
          cat REPORT.txt

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chip-v18-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            REPORT.txt
            targets.txt
            targets_analysis.json
            scan.log
          retention-days: 90
