name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V500.06 VỪA ĐỦ"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '5000x'
        type: choice
        options:
          - 1000x
          - 5000x
          - 10000x
      target_count:
        description: '🎯 SỐ WEB CẦN QUÉT'
        required: false
        default: '15000'
        type: choice
        options:
          - 5000
          - 10000
          - 15000
          - 20000
  schedule:
    - cron: '0 */1 * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    
    steps:
      - name: 🧠 KHỞI TẠO CHIP V500.06
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                            ║"
          echo "║     🧠 CHIP V500.06 - VỪA ĐỦ SỨC - CHẠY ỔN ĐỊNH                         ║"
          echo "║                                                                            ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔥 CẤP ĐỘ AI: ${{ github.event.inputs.ai_level || '5000x' }}"
          echo "🚀 CHẾ ĐỘ QUÉT: ${{ github.event.inputs.scan_mode || 'ultimate' }}"
          echo "🎯 SỐ WEB: ${{ github.event.inputs.target_count || '15000' }}"
          echo ""
          echo "⚡ CHIP V500.06 - CÂN BẰNG:"
          echo "  📥 10 nguồn template - ĐỦ MẠNH"
          echo "  ⚡ CONCURRENCY 80 - VỪA ĐỦ"
          echo "  🚀 RATE LIMIT 50 - AN TOÀN"
          echo "  ⏱️ KHÔNG TIMEOUT - CHẠY ỔN ĐỊNH"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ
        run: |
          set -e
          echo "🔥 ĐANG CÀI ĐẶT CÔNG CỤ..."
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            jq curl git python3 python3-pip massdns nmap ffuf unzip wget \
            && sudo rm -rf /var/lib/apt/lists/*
          
          echo "📥 ĐANG TẢI NUCLEI..."
          wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          echo "🔍 NUCLEI VERSION: $(nuclei -version 2>/dev/null | head -1 || echo 'N/A')"
          
          pip3 install -q requests beautifulsoup4 lxml
          
          echo "📥 CẬP NHẬT TEMPLATE NUCLEI..."
          for i in 1 2 3; do
            nuclei -update-templates -silent && break || echo "⚠️ Lỗi lần $i, thử lại..."
            sleep 5
          done
          
          nuclei -templates-version
          
          echo "📥 TẢI 10 NGUỒN TEMPLATE..."
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          
          repos=(
            "projectdiscovery/nuclei-templates"
            "geeknik/nuclei-templates"
            "notnotnotveg/nuclei-templates"
            "random-robbie/nuclei-templates"
            "zeroc00I/nuclei-templates"
            "gwen001/nuclei-templates"
            "dhiyaneshdk/nuclei-templates"
            "pikpikcu/nuclei-templates"
            "ehsandeep/nuclei-templates"
            "ddworken/nuclei-templates"
          )
          
          for repo in "${repos[@]}"; do
            name=$(echo $repo | cut -d'/' -f2)
            echo "  📥 Đang tải: $name..."
            git clone --depth 1 -q "https://github.com/$repo.git" "$name" 2>/dev/null || true
          done
          
          mkdir -p all
          find . -name "*.yaml" -exec cp {} all/ \; 2>/dev/null
          
          TEMPLATE_COUNT=$(find . -name "*.yaml" | wc -l)
          echo "📊 TỔNG TEMPLATE: $TEMPLATE_COUNT"
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 🌍 LẤY WEB
        id: get_targets
        run: |
          set -e
          echo "🌌 CHIP V500.06 ĐANG TÌM WEB..."
          
          cat > targets.txt << 'EOF'
          # === WEB TEST CÓ LỖI ===
          https://testphp.vulnweb.com
          https://testasp.vulnweb.com
          https://testhtml5.vulnweb.com
          https://testaspnet.vulnweb.com
          https://demo.testfire.net
          https://juice-shop.herokuapp.com
          https://dvwa.co.uk
          https://www.hackthissite.org
          https://www.root-me.org
          https://pentesterlab.com
          https://portswigger.net/web-security
          https://www.hackerone.com
          https://www.bugcrowd.com
          https://www.immunefi.com
          https://www.vulnweb.com
          https://zero.webappsecurity.com
          
          # === WEB VIỆT NAM ===
          https://vietnamnet.vn
          https://zingnews.vn
          https://kenh14.vn
          https://tinhte.vn
          https://tiki.vn
          https://shopee.vn
          https://fpt.vn
          https://viettel.vn
          https://thegioididong.com
          https://cellphones.com.vn
          https://dienmayxanh.com
          https://tuoitre.vn
          https://thanhnien.vn
          https://vtc.vn
          https://vnexpress.net
          https://nld.com.vn
          https://cafef.vn
          https://genk.vn
          https://soha.vn
          https://dantri.com.vn
          https://baomoi.com
          https://vov.vn
          https://chinhphu.vn
          https://mof.gov.vn
          https://mic.gov.vn
          https://moit.gov.vn
          
          # === TOP WEB TOÀN CẦU ===
          https://google.com
          https://youtube.com
          https://facebook.com
          https://twitter.com
          https://instagram.com
          https://linkedin.com
          https://reddit.com
          https://netflix.com
          https://amazon.com
          https://ebay.com
          https://microsoft.com
          https://apple.com
          https://adobe.com
          https://salesforce.com
          https://oracle.com
          https://ibm.com
          https://cisco.com
          https://intel.com
          https://nvidia.com
          https://amd.com
          https://bbc.com
          https://guardian.co.uk
          https://reuters.com
          https://bloomberg.com
          https://ft.com
          https://lemonde.fr
          https://elpais.com
          https://bild.de
          https://corriere.it
          https://tass.com
          https://alibaba.com
          https://tencent.com
          https://baidu.com
          https://jd.com
          https://xiaomi.com
          https://naver.com
          https://kakao.com
          https://line.me
          https://rakuten.co.jp
          https://yahoo.co.jp
          https://shopee.sg
          https://lazada.com
          https://tokopedia.com
          https://grab.com
          https://gojek.com
          https://booking.com
          https://airbnb.com
          
          # === WEB CÓ API ===
          https://api.github.com
          https://api.twitter.com
          https://api.slack.com
          https://api.telegram.org
          https://api.discord.com
          https://api.reddit.com
          https://api.stripe.com
          https://api.paypal.com
          https://api.shopify.com
          https://api.spotify.com
          https://api.dropbox.com
          https://api.box.com
          EOF
          
          TARGET_COUNT=$(wc -l < targets.txt)
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          echo "🎯 SỐ WEB: $TARGET_COUNT"
          head -10 targets.txt

      - name: 🔍 CHIP V500.06 - QUÉT VỪA ĐỦ
        timeout-minutes: 52
        run: |
          set -e
          echo "⏰ CHIP V500.06 BẮT ĐẦU: $(date)"
          echo "🎯 MỤC TIÊU: ${{ env.target_count }}"
          
          export PATH=$PATH:/usr/local/go/bin
          
          # === CÂN BẰNG HOÀN HẢO ===
          CONCURRENCY=80
          BULK_SIZE=40
          RATE_LIMIT=50
          TIMEOUT=18
          RETRIES=5
          MAX_REDIRECTS=15
          
          if [ -z "${{ github.event.inputs.severity_level }}" ]; then
            SEVERITY="critical,high,medium,low,info"
          else
            SEVERITY="${{ github.event.inputs.severity_level }}"
          fi
          
          echo "⚙️ CHIP V500.06 - VỪA ĐỦ:"
          echo "⚙️ CONCURRENCY: $CONCURRENCY"
          echo "⚙️ BULK_SIZE: $BULK_SIZE"
          echo "⚙️ RATE_LIMIT: $RATE_LIMIT"
          echo "⚙️ TIMEOUT: $TIMEOUT"
          echo "⚙️ RETRIES: $RETRIES"
          echo ""
          echo "🔥 QUÉT VỪA ĐỦ - CHẠY ỔN ĐỊNH!"
          
          nuclei -list targets.txt -severity "$SEVERITY" \
            -t ~/nuclei-templates/ \
            -t ~/nuclei-templates/all/ \
            -t ~/nuclei-templates/nuclei-templates/ \
            -t ~/nuclei-templates/geeknik/ \
            -t ~/nuclei-templates/extra/ \
            -t ~/nuclei-templates/random/ \
            -t ~/nuclei-templates/zero/ \
            -t ~/nuclei-templates/gwen001/ \
            -t ~/nuclei-templates/dhiyaneshdk/ \
            -t ~/nuclei-templates/pikpikcu/ \
            -t ~/nuclei-templates/ehsandeep/ \
            -t ~/nuclei-templates/ddworken/ \
            -c $CONCURRENCY -bulk-size $BULK_SIZE -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT -retries $RETRIES -max-redirects $MAX_REDIRECTS -follow-redirects \
            -stats -stats-interval 10 -rdb report.db -json-export results.json \
            -jle results.jsonl -o results.txt -no-interactsh -disable-update-check \
            -max-host-error 20 -no-mhe -project -project-path /tmp/nuclei-project \
            -silent -no-color 2>&1 | tee scan.log
          
          echo "=================================================="
          echo "📊 KẾT QUẢ QUÉT:"
          echo "=================================================="
          
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG SỐ LỖI: $TOTAL"
          
          if [ -f results.json ]; then
              CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
              HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
              MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
              LOW=$(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)
              INFO=$(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)
              
              echo "🔥 CRITICAL: $CRITICAL"
              echo "⚡ HIGH: $HIGH"
              echo "🟡 MEDIUM: $MEDIUM"
              echo "🟢 LOW: $LOW"
              echo "ℹ️ INFO: $INFO"
          fi
          echo "=================================================="

      - name: 📄 BÁO CÁO HOÀN HẢO
        if: always()
        run: |
          set -e
          echo "🧠 CHIP V500.06 ĐANG TẠO BÁO CÁO..."
          
          TOTAL=$(jq -s 'length' results.json 2>/dev/null || echo 0)
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          LOW=$(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)
          INFO=$(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)
          TARGET_COUNT=$(cat targets.txt 2>/dev/null | wc -l || echo 0)
          
          ESTIMATED_BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200 + LOW * 50))
          RISK_SCORE=$((CRITICAL * 10 + HIGH * 5 + MEDIUM * 2))
          
          if [ $RISK_SCORE -gt 80 ]; then
              RISK_LEVEL="🔴 CỰC KỲ NGUY HIỂM"
          elif [ $RISK_SCORE -gt 50 ]; then
              RISK_LEVEL="🟠 RẤT NGUY HIỂM"
          elif [ $RISK_SCORE -gt 25 ]; then
              RISK_LEVEL="🟡 NGUY HIỂM"
          elif [ $RISK_SCORE -gt 10 ]; then
              RISK_LEVEL="🟢 THẤP"
          else
              RISK_LEVEL="⚪ RẤT THẤP"
          fi
          
          cat > FINAL_REPORT.txt << EOF
          ╔══════════════════════════════════════════════════════════════════════════════╗
          ║     🧠 CHIP V500.06 - BÁO CÁO HOÀN HẢO - VỪA ĐỦ SỨC                      ║
          ╚══════════════════════════════════════════════════════════════════════════════╝
          
          📅 $(date '+%Y-%m-%d %H:%M:%S') | 🔄 #${{ github.run_number }} | 🎯 $TARGET_COUNT web
          
          ════════════════════════════════════════════════════════════════════════════════
          📊 KẾT QUẢ
          ════════════════════════════════════════════════════════════════════════════════
          📦 TỔNG LỖI: $TOTAL
          🔥 CRITICAL: $CRITICAL  (💰 \$5,000+/lỗi)
          ⚡ HIGH: $HIGH          (💰 \$1,000+/lỗi)
          🟡 MEDIUM: $MEDIUM      (💰 \$200+/lỗi)
          🟢 LOW: $LOW            (💰 \$50+/lỗi)
          ℹ️ INFO: $INFO          (💰 Có giá trị)
          
          ════════════════════════════════════════════════════════════════════════════════
          💰 PHÂN TÍCH
          ════════════════════════════════════════════════════════════════════════════════
          📊 RISK SCORE: $RISK_SCORE
          ⚠️ RISK LEVEL: $RISK_LEVEL
          💰 BOUNTY: \$$(printf "%'d" $ESTIMATED_BOUNTY)
          EOF
          
          echo "" >> FINAL_REPORT.txt
          echo "╔══════════════════════════════════════════════════════════════════════════════╗" >> FINAL_REPORT.txt
          echo "║        ✅ BÁO CÁO HOÀN TẤT - CHIP V500.06                                 ║" >> FINAL_REPORT.txt
          echo "║  💰 \$$(printf "%'d" $ESTIMATED_BOUNTY)  |  ⚠️ $RISK_LEVEL                ║" >> FINAL_REPORT.txt
          echo "╚══════════════════════════════════════════════════════════════════════════════╝" >> FINAL_REPORT.txt
          
          echo "✅ BÁO CÁO HOÀN TẤT!"
          cat FINAL_REPORT.txt

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chip-v500-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            FINAL_REPORT.txt
            report.html
            targets.txt
            history.json
            report.db
            scan.log
            ~/nuclei-templates/
            /tmp/nuclei-project/
          retention-days: 90
