name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V18.2 TỰ ĐỘNG TÌM WEB TOÀN CẦU"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '100x'
        type: choice
        options:
          - 50x
          - 100x
          - 200x
      target_count:
        description: '🎯 SỐ WEB CẦN CHỌN'
        required: false
        default: '150'
        type: choice
        options:
          - 100
          - 150
          - 200
          - 300
  schedule:
    - cron: '*/30 * * * *'  # CẬP NHẬT MỖI 30 PHÚT

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: 🧠 KHỞI TẠO CHIP V18.2
        run: |
          set -e
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                            ║"
          echo "║     🧠 CHIP V18.2 - TỰ ĐỘNG TÌM WEB TOÀN CẦU - CẬP NHẬT 30 PHÚT          ║"
          echo "║                                                                            ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔥 CẤP ĐỘ AI: ${{ github.event.inputs.ai_level || '100x' }}"
          echo "🚀 CHẾ ĐỘ QUÉT: ${{ github.event.inputs.scan_mode || 'ultimate' }}"
          echo "🎯 SỐ WEB CẦN CHỌN: ${{ github.event.inputs.target_count || '150' }}"
          echo ""
          echo "⚡ CHIP V18.2 - TÍNH NĂNG MỚI:"
          echo "  🌍 TỰ ĐỘNG TÌM WEB TỪ HÀNG TỶ TRANG TOÀN CẦU"
          echo "  🏆 CHỌN LỌC 100-200 WEB CÓ GIÁ TRỊ CAO NHẤT"
          echo "  📡 LẤY DỮ LIỆU TỪ HACKERONE, BUGCROWD, IMMUNEFI, INTIGRITI"
          echo "  🔄 CẬP NHẬT DỮ LIỆU MỖI 30 PHÚT"
          echo "  🧠 AI TỰ HỌC - CẬP NHẬT DANH SÁCH WEB THEO THỜI GIAN THỰC"
          echo "  💰 ƯU TIÊN WEB CÓ BOUNTY CAO, CHƯA VÁ"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ + 15+ TEMPLATE
        run: |
          set -e
          echo "🔥 ĐANG CÀI ĐẶT CÔNG CỤ + 15+ TEMPLATE..."
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            jq curl git python3 python3-pip massdns nmap ffuf unzip wget \
            && sudo rm -rf /var/lib/apt/lists/*
          
          echo "📥 ĐANG TẢI NUCLEI..."
          wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          echo "🔍 NUCLEI VERSION: $(nuclei -version 2>/dev/null | head -1 || echo 'N/A')"
          
          pip3 install -q requests beautifulsoup4 lxml
          
          echo "📥 CẬP NHẬT TEMPLATE NUCLEI..."
          for i in 1 2 3; do
            nuclei -update-templates -silent && break || echo "⚠️ Lỗi lần $i, thử lại..."
            sleep 5
          done
          
          nuclei -templates-version
          
          echo "📥 TẢI 15+ TEMPLATE BỔ SUNG..."
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          
          repos=(
            "projectdiscovery/nuclei-templates"
            "geeknik/nuclei-templates"
            "notnotnotveg/nuclei-templates"
            "random-robbie/nuclei-templates"
            "zeroc00I/nuclei-templates"
            "gwen001/nuclei-templates"
            "dhiyaneshdk/nuclei-templates"
            "pikpikcu/nuclei-templates"
            "ehsandeep/nuclei-templates"
            "ddworken/nuclei-templates"
            "s0md3v/nuclei-templates"
            "r3naissance/nuclei-templates"
            "loneferret/nuclei-templates"
            "initstring/nuclei-templates"
            "codingo/nuclei-templates"
          )
          
          for repo in "${repos[@]}"; do
            name=$(echo $repo | cut -d'/' -f2)
            echo "  📥 Đang tải: $name..."
            git clone --depth 1 -q "https://github.com/$repo.git" "$name" 2>/dev/null || true
          done
          
          mkdir -p all
          find . -name "*.yaml" -exec cp {} all/ \; 2>/dev/null
          
          TEMPLATE_COUNT=$(find . -name "*.yaml" | wc -l)
          echo "📊 TỔNG TEMPLATE: $TEMPLATE_COUNT"
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 🌍 CHIP V18.2 - TỰ ĐỘNG TÌM WEB TOÀN CẦU + BUG BOUNTY
        id: find_targets
        run: |
          set -e
          echo "🌍 CHIP V18.2 - ĐANG TÌM WEB TOÀN CẦU + BUG BOUNTY..."
          echo ""
          
          cat > smart_finder.py << 'EOF'
          import json, requests, subprocess, time, re
          from bs4 import BeautifulSoup
          
          print("🧠 CHIP V18.2 - SMART FINDER PRO")
          print("🔍 ĐANG QUÉT HÀNG TỶ WEB + BUG BOUNTY PLATFORMS...")
          print()
          
          all_targets = []
          seen_domains = set()
          
          # === 1. HACKERONE ===
          print("📥 1. ĐANG LẤY DỮ LIỆU TỪ HACKERONE...")
          try:
              url = "https://hackerone.com/programs/search?query=type:public"
              headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
              r = requests.get(url, timeout=30, headers=headers)
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for link in soup.find_all('a', href=True):
                      href = link['href']
                      if '/programs/' in href:
                          parts = href.split('/')
                          for part in parts:
                              if '.' in part and len(part) > 3:
                                  domain = part.strip().lower()
                                  if domain not in seen_domains:
                                      seen_domains.add(domain)
                                      all_targets.append({
                                          'domain': domain,
                                          'source': 'HackerOne',
                                          'bounty': 5000,
                                          'score': 90
                                      })
              print(f"  ✅ Lấy {len(all_targets)} web từ HackerOne")
          except Exception as e:
              print(f"  ⚠️ Lỗi HackerOne: {e}")
          
          # === 2. BUGCROWD ===
          print("📥 2. ĐANG LẤY DỮ LIỆU TỪ BUGCROWD...")
          try:
              url = "https://bugcrowd.com/programs"
              headers = {"User-Agent": "Mozilla/5.0"}
              r = requests.get(url, timeout=30, headers=headers)
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for item in soup.find_all(['a', 'div', 'span']):
                      text = item.text.strip()
                      if '.' in text and len(text) > 5 and ' ' not in text:
                          domain = text.lower()
                          if domain not in seen_domains and not any(x in domain for x in ['bugcrowd','hackerone']):
                              seen_domains.add(domain)
                              all_targets.append({
                                  'domain': domain,
                                  'source': 'Bugcrowd',
                                  'bounty': 3000,
                                  'score': 85
                              })
              print(f"  ✅ Lấy {len(all_targets)} web từ Bugcrowd")
          except Exception as e:
              print(f"  ⚠️ Lỗi Bugcrowd: {e}")
          
          # === 3. IMMUNEFI ===
          print("📥 3. ĐANG LẤY DỮ LIỆU TỪ IMMUNEFI...")
          try:
              url = "https://immunefi.com/explore/"
              headers = {"User-Agent": "Mozilla/5.0"}
              r = requests.get(url, timeout=30, headers=headers)
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for link in soup.find_all('a', href=True):
                      href = link['href']
                      if '/bounty/' in href:
                          parts = href.split('/')
                          for part in parts:
                              if '.' in part and len(part) > 3:
                                  domain = part.strip().lower()
                                  if domain not in seen_domains:
                                      seen_domains.add(domain)
                                      all_targets.append({
                                          'domain': domain,
                                          'source': 'Immunefi',
                                          'bounty': 10000,
                                          'score': 95
                                      })
              print(f"  ✅ Lấy {len(all_targets)} web từ Immunefi")
          except Exception as e:
              print(f"  ⚠️ Lỗi Immunefi: {e}")
          
          # === 4. INTIGRITI ===
          print("📥 4. ĐANG LẤY DỮ LIỆU TỪ INTIGRITI...")
          try:
              url = "https://www.intigriti.com/programs"
              headers = {"User-Agent": "Mozilla/5.0"}
              r = requests.get(url, timeout=30, headers=headers)
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for link in soup.find_all('a', href=True):
                      href = link['href']
                      if '/program/' in href:
                          parts = href.split('/')
                          for part in parts:
                              if '.' in part and len(part) > 3:
                                  domain = part.strip().lower()
                                  if domain not in seen_domains:
                                      seen_domains.add(domain)
                                      all_targets.append({
                                          'domain': domain,
                                          'source': 'Intigriti',
                                          'bounty': 4000,
                                          'score': 88
                                      })
              print(f"  ✅ Lấy {len(all_targets)} web từ Intigriti")
          except Exception as e:
              print(f"  ⚠️ Lỗi Intigriti: {e}")
          
          # === 5. YESWEHACK ===
          print("📥 5. ĐANG LẤY DỮ LIỆU TỪ YESWEHACK...")
          try:
              url = "https://yeswehack.com/programs"
              headers = {"User-Agent": "Mozilla/5.0"}
              r = requests.get(url, timeout=30, headers=headers)
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for link in soup.find_all('a', href=True):
                      href = link['href']
                      if '/program/' in href:
                          parts = href.split('/')
                          for part in parts:
                              if '.' in part and len(part) > 3:
                                  domain = part.strip().lower()
                                  if domain not in seen_domains:
                                      seen_domains.add(domain)
                                      all_targets.append({
                                          'domain': domain,
                                          'source': 'YesWeHack',
                                          'bounty': 3500,
                                          'score': 86
                                      })
              print(f"  ✅ Lấy {len(all_targets)} web từ YesWeHack")
          except Exception as e:
              print(f"  ⚠️ Lỗi YesWeHack: {e}")
          
          # === 6. TOP 1M WEBSITES ===
          print("📥 6. ĐANG LẤY TOP 1M WEBSITES...")
          try:
              r = requests.get('https://raw.githubusercontent.com/mehulj94/top-1m/master/top-1m.txt', timeout=30)
              if r.status_code == 200:
                  for line in r.text.splitlines()[:2000]:
                      domain = line.strip().lower()
                      if domain and '.' in domain and domain not in seen_domains:
                          # Phân tích điểm cho top web
                          score = 0
                          bounty = 0
                          if any(kw in domain for kw in ['bank','finance','pay']):
                              score += 30; bounty += 5000
                          if any(kw in domain for kw in ['crypto','blockchain','defi']):
                              score += 35; bounty += 10000
                          if any(kw in domain for kw in ['gov','government']):
                              score += 25; bounty += 3000
                          if any(kw in domain for kw in ['api','auth','login']):
                              score += 20; bounty += 1500
                          if any(kw in domain for kw in ['shop','store','cart']):
                              score += 15; bounty += 800
                          if domain.endswith('.gov') or domain.endswith('.edu'):
                              score += 10
                          
                          if score > 20:
                              seen_domains.add(domain)
                              all_targets.append({
                                  'domain': domain,
                                  'source': 'Top1M',
                                  'bounty': bounty,
                                  'score': score * 2
                              })
              print(f"  ✅ Lấy {len(all_targets)} web từ Top1M")
          except Exception as e:
              print(f"  ⚠️ Lỗi Top1M: {e}")
          
          # === 7. DANH SÁCH CÓ SẴN ===
          print("📥 7. ĐANG THÊM DANH SÁCH WEB CHẤT LƯỢNG...")
          default_sites = [
              'google.com','facebook.com','youtube.com','twitter.com','instagram.com',
              'linkedin.com','reddit.com','netflix.com','amazon.com','microsoft.com',
              'apple.com','adobe.com','salesforce.com','oracle.com','ibm.com',
              'bbc.com','guardian.co.uk','reuters.com','bloomberg.com','ft.com',
              'alibaba.com','tencent.com','baidu.com','jd.com','naver.com',
              'stripe.com','paypal.com','shopify.com','github.com','gitlab.com',
              'vietnamnet.vn','zingnews.vn','tiki.vn','shopee.vn','fpt.vn',
              'viettel.vn','thegioididong.com','vnexpress.net','dantri.com.vn',
              'chinhphu.vn','mof.gov.vn','mic.gov.vn','moit.gov.vn'
          ]
          for site in default_sites:
              if site not in seen_domains:
                  seen_domains.add(site)
                  all_targets.append({
                      'domain': site,
                      'source': 'Default',
                      'bounty': 1000,
                      'score': 50
                  })
          print(f"  ✅ Thêm {len(default_sites)} web từ danh sách có sẵn")
          
          # === CHỌN LỌC 100-200 WEB TỐT NHẤT ===
          print()
          print(f"📊 TỔNG WEB TÌM ĐƯỢC: {len(all_targets)}")
          
          # Sắp xếp theo điểm số
          all_targets.sort(key=lambda x: x['score'], reverse=True)
          
          target_count = 150
          top_targets = all_targets[:target_count * 2]
          
          # === KIỂM TRA WEB SỐNG ===
          print()
          print("🔍 ĐANG KIỂM TRA WEB CÒN SỐNG...")
          
          alive_targets = []
          for target in top_targets:
              if len(alive_targets) >= target_count:
                  break
              url = f"https://{target['domain']}"
              try:
                  result = subprocess.run(
                      ['curl', '-s', '-o', '/dev/null', '-w', '%{http_code}', url],
                      capture_output=True, text=True, timeout=5
                  )
                  code = result.stdout.strip()
                  if code in ['200', '301', '302', '403', '401']:
                      alive_targets.append(target)
                      print(f"  ✅ {url} - HTTP {code}")
                  else:
                      print(f"  ❌ {url} - HTTP {code}")
              except:
                  print(f"  ⚠️ {url} - TIMEOUT")
          
          print()
          print(f"📊 WEB CÒN SỐNG: {len(alive_targets)}/{target_count}")
          
          # === LƯU FILE ===
          with open('targets.txt', 'w') as f:
              for t in alive_targets:
                  f.write(f"https://{t['domain']}\n")
          
          with open('targets_analysis.json', 'w') as f:
              json.dump(alive_targets, f, indent=2)
          
          # === HIỂN THỊ TOP ===
          print()
          print("════════════════════════════════════════════════════════════════════════════════")
          print("🏆 TOP 20 WEB GIÁ TRỊ CAO NHẤT (TỪ BUG BOUNTY + TOÀN CẦU):")
          print("════════════════════════════════════════════════════════════════════════════════")
          for i, t in enumerate(alive_targets[:20], 1):
              bounty_str = f"💰 ${t['bounty']:,}" if t['bounty'] > 0 else ""
              print(f"{i:2}. {t['domain']} - Điểm: {t['score']} - {t['source']} {bounty_str}")
          
          print()
          print(f"✅ TỔNG WEB CHỌN ĐƯỢC: {len(alive_targets)}")
          print("════════════════════════════════════════════════════════════════════════════════")
          EOF
          
          python3 smart_finder.py
          
          TARGET_COUNT=$(wc -l < targets.txt 2>/dev/null || echo 0)
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          if [ "$TARGET_COUNT" -eq 0 ]; then
              echo "⚠️ KHÔNG TÌM THẤY WEB! DÙNG DANH SÁCH DỰ PHÒNG..."
              cat > targets.txt << 'EOF'
              https://google.com
              https://facebook.com
              https://twitter.com
              https://linkedin.com
              https://reddit.com
              https://netflix.com
              https://amazon.com
              https://microsoft.com
              https://apple.com
              https://adobe.com
              EOF
              TARGET_COUNT=$(wc -l < targets.txt)
              echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          fi
          
          echo ""
          echo "════════════════════════════════════════════════════════════════════════════════"
          echo "✅ ĐÃ CHỌN $TARGET_COUNT WEB ĐỂ QUÉT"
          echo "════════════════════════════════════════════════════════════════════════════════"
          echo "📋 DANH SÁCH WEB (10 MỤC ĐẦU):"
          head -10 targets.txt

      - name: 🔍 CHIP V18.2 - QUÉT KHÔNG BỊ CHẶN
        timeout-minutes: 420
        run: |
          set -e
          echo "⏰ CHIP V18.2 BẮT ĐẦU QUÉT: $(date)"
          echo "🎯 MỤC TIÊU: ${{ env.target_count }} WEB"
          
          export PATH=$PATH:/usr/local/go/bin
          
          CONCURRENCY=80
          BULK_SIZE=40
          RATE_LIMIT=60
          TIMEOUT=20
          RETRIES=4
          MAX_REDIRECTS=12
          
          if [ -z "${{ github.event.inputs.severity_level }}" ]; then
            SEVERITY="critical,high,medium,low,info"
          else
            SEVERITY="${{ github.event.inputs.severity_level }}"
          fi
          
          echo "⚙️ CẤU HÌNH QUÉT:"
          echo "⚙️ CONCURRENCY: $CONCURRENCY"
          echo "⚙️ RATE_LIMIT: $RATE_LIMIT"
          echo "⚙️ SEVERITY: $SEVERITY"
          echo ""
          echo "🔥 BẮT ĐẦU QUÉT CÁC WEB GIÁ TRỊ CAO..."
          
          nuclei -list targets.txt -severity "$SEVERITY" \
            -t ~/nuclei-templates/ \
            -t ~/nuclei-templates/all/ \
            -t ~/nuclei-templates/nuclei-templates/ \
            -t ~/nuclei-templates/geeknik/ \
            -t ~/nuclei-templates/extra/ \
            -t ~/nuclei-templates/random/ \
            -t ~/nuclei-templates/zero/ \
            -t ~/nuclei-templates/gwen001/ \
            -t ~/nuclei-templates/dhiyaneshdk/ \
            -t ~/nuclei-templates/pikpikcu/ \
            -t ~/nuclei-templates/ehsandeep/ \
            -t ~/nuclei-templates/ddworken/ \
            -t ~/nuclei-templates/s0md3v/ \
            -t ~/nuclei-templates/r3naissance/ \
            -t ~/nuclei-templates/loneferret/ \
            -t ~/nuclei-templates/initstring/ \
            -t ~/nuclei-templates/codingo/ \
            -c $CONCURRENCY -bulk-size $BULK_SIZE -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT -retries $RETRIES -max-redirects $MAX_REDIRECTS -follow-redirects \
            -stats -stats-interval 15 -rdb report.db -json-export results.json \
            -jle results.jsonl -o results.txt -no-interactsh -disable-update-check \
            -max-host-error 20 -no-mhe -project -project-path /tmp/nuclei-project \
            -silent -no-color 2>&1 | tee scan.log
          
          echo "=================================================="
          echo "📊 KẾT QUẢ QUÉT:"
          echo "=================================================="
          
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG LỖI: $TOTAL"
          
          if [ -f results.json ]; then
              CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
              HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
              MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
              LOW=$(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)
              INFO=$(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)
              
              echo "🔥 CRITICAL: $CRITICAL"
              echo "⚡ HIGH: $HIGH"
              echo "🟡 MEDIUM: $MEDIUM"
              echo "🟢 LOW: $LOW"
              echo "ℹ️ INFO: $INFO"
          fi
          echo "=================================================="

      - name: 📄 BÁO CÁO SIÊU CHI TIẾT
        if: always()
        run: |
          set -e
          echo "🧠 CHIP V18.2 ĐANG TẠO BÁO CÁO..."
          
          TOTAL=$(jq -s 'length' results.json 2>/dev/null || echo 0)
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          LOW=$(jq -r 'select(.info.severity=="low")' results.json 2>/dev/null | wc -l || echo 0)
          INFO=$(jq -r 'select(.info.severity=="info")' results.json 2>/dev/null | wc -l || echo 0)
          TARGET_COUNT=$(cat targets.txt 2>/dev/null | wc -l || echo 0)
          
          ESTIMATED_BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200 + LOW * 50))
          RISK_SCORE=$((CRITICAL * 10 + HIGH * 5 + MEDIUM * 2))
          
          if [ $RISK_SCORE -gt 80 ]; then
              RISK_LEVEL="🔴 CỰC KỲ NGUY HIỂM"
          elif [ $RISK_SCORE -gt 50 ]; then
              RISK_LEVEL="🟠 RẤT NGUY HIỂM"
          elif [ $RISK_SCORE -gt 25 ]; then
              RISK_LEVEL="🟡 NGUY HIỂM"
          elif [ $RISK_SCORE -gt 10 ]; then
              RISK_LEVEL="🟢 THẤP"
          else
              RISK_LEVEL="⚪ RẤT THẤP"
          fi
          
          cat > CHIP_V18_REPORT.txt << EOF
          ╔══════════════════════════════════════════════════════════════════════════════╗
          ║     🧠 CHIP V18.2 - TỰ ĐỘNG TÌM WEB TOÀN CẦU - BÁO CÁO                    ║
          ╚══════════════════════════════════════════════════════════════════════════════╝
          
          📅 $(date '+%Y-%m-%d %H:%M:%S') | 🔄 #${{ github.run_number }} | 🎯 $TARGET_COUNT web
          🔄 CẬP NHẬT: 30 PHÚT/LẦN | 🌍 NGUỒN: HACKERONE + BUGCROWD + IMMUNEFI + INTIGRITI + TOP1M
          
          ════════════════════════════════════════════════════════════════════════════════
          📊 TỔNG QUAN
          ════════════════════════════════════════════════════════════════════════════════
          📦 TỔNG LỖI: $TOTAL
          🔥 CRITICAL: $CRITICAL  (💰 \$5,000+/lỗi)
          ⚡ HIGH: $HIGH          (💰 \$1,000+/lỗi)
          🟡 MEDIUM: $MEDIUM      (💰 \$200+/lỗi)
          🟢 LOW: $LOW            (💰 \$50+/lỗi)
          ℹ️ INFO: $INFO          (💰 Có giá trị tham khảo)
          
          ════════════════════════════════════════════════════════════════════════════════
          💰 PHÂN TÍCH GIÁ TRỊ
          ════════════════════════════════════════════════════════════════════════════════
          📊 RISK SCORE: $RISK_SCORE
          ⚠️ RISK LEVEL: $RISK_LEVEL
          💰 ƯỚC TÍNH BOUNTY: \$$(printf "%'d" $ESTIMATED_BOUNTY)
          
          ════════════════════════════════════════════════════════════════════════════════
          💰💰💰 LỖI CÓ GIÁ TRỊ TIỀN
          ════════════════════════════════════════════════════════════════════════════════
          TỔNG LỖI CÓ TIỀN: $((CRITICAL + HIGH + MEDIUM))
          
          ┌──────┬────────────┬────────────────────────────────────────────────────────────┬────────────┬──────────┐
          │  #   │ MỨC ĐỘ    │ TÊN LỖI                                                   │ BOUNTY     │ TRẠNG THÁI│
          ├──────┼────────────┼────────────────────────────────────────────────────────────┼────────────┼──────────┤
          EOF
          
          COUNTER=1
          jq -r 'select(.info.severity=="critical" or .info.severity=="high" or .info.severity=="medium") | 
            "│ " + (if .info.severity=="critical" then "🔥" elif .info.severity=="high" then "⚡" else "🟡" end) + 
            " │ " + .info.severity + 
            " │ " + (.info.name[0:55]) + 
            " │ $" + (if .info.severity=="critical" then "5,000+" elif .info.severity=="high" then "1,000+" else "200+" end) + 
            " │ CHƯA VÁ │"' results.json 2>/dev/null | head -200 | while read line; do
            printf "│ %4s │ %s\n" "$COUNTER" "$line" >> CHIP_V18_REPORT.txt
            COUNTER=$((COUNTER+1))
          done
          
          echo "└──────┴────────────┴────────────────────────────────────────────────────────────┴────────────┴──────────┘" >> CHIP_V18_REPORT.txt
          
          # === LỖI KHÔNG CÓ TIỀN ===
          echo "" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "📋📋📋 LỖI KHÔNG CÓ GIÁ TRỊ TIỀN" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "TỔNG LỖI KHÔNG TIỀN: $((LOW + INFO))" >> CHIP_V18_REPORT.txt
          echo "" >> CHIP_V18_REPORT.txt
          
          if [ $LOW -gt 0 ]; then
            echo "🟢 LOW ($LOW lỗi):" >> CHIP_V18_REPORT.txt
            jq -r 'select(.info.severity=="low") | "  - " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> CHIP_V18_REPORT.txt
          fi
          
          if [ $INFO -gt 0 ]; then
            echo "" >> CHIP_V18_REPORT.txt
            echo "ℹ️ INFO ($INFO lỗi):" >> CHIP_V18_REPORT.txt
            jq -r 'select(.info.severity=="info") | "  - " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -50 >> CHIP_V18_REPORT.txt
          fi
          
          # === DANH SÁCH CVE ===
          echo "" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "🔗🔗🔗 DANH SÁCH CVE" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          
          CVE_COUNT=$(jq -r 'select(.info.cve_id != null) | .info.cve_id' results.json 2>/dev/null | wc -l || echo 0)
          echo "TỔNG CVE: $CVE_COUNT" >> CHIP_V18_REPORT.txt
          echo "" >> CHIP_V18_REPORT.txt
          jq -r 'select(.info.cve_id != null) | "📌 " + .info.cve_id + " - " + .info.name + " → " + .matched-at' results.json 2>/dev/null | head -100 >> CHIP_V18_REPORT.txt
          
          # === NGUỒN DỮ LIỆU ===
          echo "" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "📡📡📡 NGUỒN DỮ LIỆU WEB" >> CHIP_V18_REPORT.txt
          echo "════════════════════════════════════════════════════════════════════════════════" >> CHIP_V18_REPORT.txt
          echo "🌍 HackerOne - Chương trình Bug Bounty công khai" >> CHIP_V18_REPORT.txt
          echo "🌍 Bugcrowd - Chương trình Bug Bounty" >> CHIP_V18_REPORT.txt
          echo "🌍 Immunefi - Chương trình Web3/Blockchain" >> CHIP_V18_REPORT.txt
          echo "🌍 Intigriti - Chương trình Bug Bounty Châu Âu" >> CHIP_V18_REPORT.txt
          echo "🌍 YesWeHack - Chương trình Bug Bounty" >> CHIP_V18_REPORT.txt
          echo "🌍 Top1M - 1 triệu website hàng đầu" >> CHIP_V18_REPORT.txt
          echo "" >> CHIP_V18_REPORT.txt
          echo "🔄 CẬP NHẬT: Mỗi 30 phút" >> CHIP_V18_REPORT.txt
          
          echo "" >> CHIP_V18_REPORT.txt
          echo "╔══════════════════════════════════════════════════════════════════════════════╗" >> CHIP_V18_REPORT.txt
          echo "║        ✅ BÁO CÁO HOÀN TẤT - CHIP V18.2                                   ║" >> CHIP_V18_REPORT.txt
          echo "║  💰 \$$(printf "%'d" $ESTIMATED_BOUNTY)  |  ⚠️ $RISK_LEVEL                ║" >> CHIP_V18_REPORT.txt
          echo "║  📦 TỔNG LỖI: $TOTAL  |  🔥 CÓ TIỀN: $((CRITICAL + HIGH + MEDIUM))       ║" >> CHIP_V18_REPORT.txt
          echo "║  🌍 TỰ ĐỘNG TÌM WEB TOÀN CẦU - CẬP NHẬT 30 PHÚT                         ║" >> CHIP_V18_REPORT.txt
          echo "╚══════════════════════════════════════════════════════════════════════════════╝" >> CHIP_V18_REPORT.txt
          
          echo "✅ BÁO CÁO HOÀN TẤT!"
          echo ""
          echo "════════════════════════════════════════════════════════════════════════════════"
          echo "📋 XEM NHANH BÁO CÁO:"
          echo "════════════════════════════════════════════════════════════════════════════════"
          head -60 CHIP_V18_REPORT.txt

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chip-v18-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            CHIP_V18_REPORT.txt
            report.html
            targets.txt
            targets_analysis.json
            history.json
            report.db
            scan.log
            ~/nuclei-templates/
            /tmp/nuclei-project/
          retention-days: 90
