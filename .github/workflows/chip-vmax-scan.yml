name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V500.12 FIXED"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '10000x'
        type: choice
        options:
          - 1000x
          - 5000x
          - 10000x
      target_count:
        description: '🎯 SỐ WEB CẦN CHỌN'
        required: false
        default: '200'
        type: choice
        options:
          - 100
          - 200
          - 300
          - 500
  schedule:
    - cron: '0 */2 * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    
    steps:
      - name: 🧠 KHỞI TẠO CHIP V500.12 FIXED
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║     🧠 CHIP V500.12 FIXED - CHỌN LỌC 200 WEB + QUÉT LỖ HỔNG              ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo "🔥 AI LEVEL: ${{ github.event.inputs.ai_level || '10000x' }}"
          echo "🎯 SỐ WEB: ${{ github.event.inputs.target_count || '200' }}"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends jq curl git python3 python3-pip unzip wget
          sudo rm -rf /var/lib/apt/lists/*
          
          wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          pip3 install -q requests beautifulsoup4 lxml
          
          for i in 1 2 3; do
            nuclei -update-templates -silent && break || sleep 5
          done
          
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          git clone --depth 1 -q https://github.com/projectdiscovery/nuclei-templates.git official 2>/dev/null || true
          git clone --depth 1 -q https://github.com/geeknik/nuclei-templates.git geeknik 2>/dev/null || true
          git clone --depth 1 -q https://github.com/notnotnotveg/nuclei-templates.git extra 2>/dev/null || true
          git clone --depth 1 -q https://github.com/random-robbie/nuclei-templates.git random 2>/dev/null || true
          git clone --depth 1 -q https://github.com/zeroc00I/nuclei-templates.git zero 2>/dev/null || true
          
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 📥 GIAI ĐOẠN 1 - CHỌN LỌC WEB
        id: select_targets
        run: |
          echo "📥 GIAI ĐOẠN 1: CHỌN LỌC WEB TỪ HÀNG TRIỆU WEB"
          
          # Tạo file Python selector
          cat > /tmp/selector.py << 'EOF'
          import json, requests, subprocess, time, sys
          
          print("🧠 CHỌN LỌC WEB THÔNG MINH")
          
          all_sites = []
          
          # NGUỒN 1: Top 1M
          print("📥 Đang tải Top 1M...")
          try:
              r = requests.get('https://raw.githubusercontent.com/mehulj94/top-1m/master/top-1m.txt', timeout=30)
              if r.status_code == 200:
                  for line in r.text.splitlines()[:5000]:
                      domain = line.strip().lower()
                      if domain and '.' in domain:
                          all_sites.append(domain)
                  print(f"  ✅ Lấy {len(all_sites)} web từ Top 1M")
          except Exception as e:
              print(f"  ⚠️ Lỗi: {e}")
          
          # NGUỒN 2: Danh sách mẫu
          default_sites = [
              'google.com','facebook.com','youtube.com','twitter.com','instagram.com',
              'linkedin.com','reddit.com','netflix.com','amazon.com','microsoft.com',
              'apple.com','adobe.com','salesforce.com','oracle.com','ibm.com',
              'bbc.com','guardian.co.uk','reuters.com','bloomberg.com','ft.com',
              'alibaba.com','tencent.com','baidu.com','jd.com','naver.com',
              'stripe.com','paypal.com','shopify.com','github.com','gitlab.com',
              'vietnamnet.vn','zingnews.vn','tiki.vn','shopee.vn','fpt.vn',
              'viettel.vn','thegioididong.com','vnexpress.net','dantri.com.vn',
              'chinhphu.vn','mof.gov.vn','mic.gov.vn','moit.gov.vn'
          ]
          all_sites.extend(default_sites)
          all_sites = list(set(all_sites))
          print(f"📊 TỔNG WEB RAW: {len(all_sites)}")
          
          # PHÂN TÍCH ĐIỂM
          scored = []
          for site in all_sites:
              if not site or len(site) < 4:
                  continue
              domain = site.lower()
              score = 0
              reasons = []
              bounty = 0
              
              if any(kw in domain for kw in ['bank','finance','pay','payment']):
                  score += 40; reasons.append("Tài chính"); bounty += 5000
              if any(kw in domain for kw in ['crypto','bitcoin','eth','defi','blockchain']):
                  score += 45; reasons.append("Crypto"); bounty += 10000
              if any(kw in domain for kw in ['gov','government','state']):
                  score += 35; reasons.append("Chính phủ"); bounty += 3000
              if any(kw in domain for kw in ['edu','university','college']):
                  score += 30; reasons.append("Giáo dục"); bounty += 2000
              if any(kw in domain for kw in ['api','gateway','auth']):
                  score += 25; reasons.append("API"); bounty += 1500
              if any(kw in domain for kw in ['admin','login','security']):
                  score += 20; reasons.append("Admin"); bounty += 1000
              if any(kw in domain for kw in ['shop','store','cart']):
                  score += 15; reasons.append("E-commerce"); bounty += 800
              
              if len(domain) < 10: score += 5
              if domain.count('.') > 1: score += 8
              if domain.endswith('.com'): score += 3
              if domain.endswith('.gov') or domain.endswith('.edu'): score += 10
              
              score = score * 2
              
              if score > 10:
                  scored.append({
                      'domain': site,
                      'url': f"https://{site}",
                      'score': score,
                      'reasons': reasons[:3],
                      'bounty_estimate': bounty,
                      'has_money': bounty > 500
                  })
          
          print(f"📊 WEB CÓ ĐIỂM > 10: {len(scored)}")
          
          # CHỌN TOP
          target_count = 200
          scored.sort(key=lambda x: x['score'], reverse=True)
          top_candidates = scored[:target_count * 2]
          
          # KIỂM TRA SỐNG
          alive = []
          for target in top_candidates:
              if len(alive) >= target_count:
                  break
              url = target['url']
              try:
                  result = subprocess.run(
                      ['curl', '-s', '-o', '/dev/null', '-w', '%{http_code}', url],
                      capture_output=True, text=True, timeout=5
                  )
                  code = result.stdout.strip()
                  if code in ['200', '301', '302', '403', '401']:
                      alive.append(target)
                      print(f"  ✅ {url}")
                  else:
                      print(f"  ❌ {url}")
              except:
                  print(f"  ⚠️ {url}")
          
          print(f"📊 WEB CÒN SỐNG: {len(alive)}/{target_count}")
          
          # LƯU FILE
          with open('targets.txt', 'w') as f:
              for t in alive:
                  f.write(f"{t['url']}\n")
          
          with open('targets_analysis.json', 'w') as f:
              json.dump(alive, f, indent=2)
          
          print(f"✅ ĐÃ CHỌN {len(alive)} WEB")
          EOF
          
          python3 /tmp/selector.py
          
          TARGET_COUNT=$(wc -l < targets.txt 2>/dev/null || echo 0)
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          if [ "$TARGET_COUNT" -eq 0 ]; then
              echo "⚠️ KHÔNG TÌM THẤY WEB! DÙNG DANH SÁCH DỰ PHÒNG..."
              cat > targets.txt << 'EOF'
              https://google.com
              https://facebook.com
              https://twitter.com
              https://linkedin.com
              https://reddit.com
              https://netflix.com
              https://amazon.com
              https://microsoft.com
              https://apple.com
              https://adobe.com
              EOF
              TARGET_COUNT=$(wc -l < targets.txt)
              echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          fi
          
          echo "🎯 SỐ WEB: $TARGET_COUNT"
          echo "📋 DANH SÁCH WEB (10 MỤC ĐẦU):"
          head -10 targets.txt

      - name: 🔍 GIAI ĐOẠN 2 - QUÉT LỖ HỔNG
        timeout-minutes: 45
        run: |
          echo "🔍 GIAI ĐOẠN 2: QUÉT LỖ HỔNG TRÊN ${{ env.target_count }} WEB"
          
          export PATH=$PATH:/usr/local/go/bin
          
          CONCURRENCY=60
          BULK_SIZE=30
          RATE_LIMIT=50
          TIMEOUT=25
          RETRIES=5
          MAX_REDIRECTS=15
          SEVERITY="critical,high,medium,low,info"
          
          echo "⚙️ CONCURRENCY: $CONCURRENCY"
          echo "⚙️ RATE_LIMIT: $RATE_LIMIT"
          echo "🔥 BẮT ĐẦU QUÉT..."
          
          nuclei -list targets.txt -severity "$SEVERITY" \
            -t ~/nuclei-templates/ \
            -t ~/nuclei-templates/official/ \
            -t ~/nuclei-templates/geeknik/ \
            -t ~/nuclei-templates/extra/ \
            -t ~/nuclei-templates/random/ \
            -t ~/nuclei-templates/zero/ \
            -c $CONCURRENCY -bulk-size $BULK_SIZE -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT -retries $RETRIES -max-redirects $MAX_REDIRECTS -follow-redirects \
            -stats -stats-interval 15 -rdb report.db -json-export results.json \
            -jle results.jsonl -o results.txt -no-interactsh -disable-update-check \
            -max-host-error 15 -no-mhe -silent -no-color 2>&1 | tee scan.log
          
          echo "📊 KẾT QUẢ QUÉT:"
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG LỖI: $TOTAL"
          
          if [ -f results.json ]; then
              CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
              HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
              MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
              echo "🔥 CRITICAL: $CRITICAL"
              echo "⚡ HIGH: $HIGH"
              echo "🟡 MEDIUM: $MEDIUM"
          fi

      - name: 📄 BÁO CÁO
        if: always()
        run: |
          TOTAL=$(jq -s 'length' results.json 2>/dev/null || echo 0)
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          TARGET_COUNT=$(cat targets.txt 2>/dev/null | wc -l || echo 0)
          
          ESTIMATED_BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200))
          
          cat > FINAL_REPORT.txt << EOF
          ╔══════════════════════════════════════════════════════════════════════════════╗
          ║     🧠 CHIP V500.12 FIXED - BÁO CÁO                                       ║
          ╚══════════════════════════════════════════════════════════════════════════════╝
          
          📅 $(date '+%Y-%m-%d %H:%M:%S')
          🎯 SỐ WEB: $TARGET_COUNT
          
          📦 TỔNG LỖI: $TOTAL
          🔥 CRITICAL: $CRITICAL  (💰 \$5,000+/lỗi)
          ⚡ HIGH: $HIGH          (💰 \$1,000+/lỗi)
          🟡 MEDIUM: $MEDIUM      (💰 \$200+/lỗi)
          
          💰 BOUNTY: \$$(printf "%'d" $ESTIMATED_BOUNTY)
          
          ✅ BÁO CÁO HOÀN TẤT!
          EOF
          
          cat FINAL_REPORT.txt

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chip-v500-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            FINAL_REPORT.txt
            targets.txt
            targets_analysis.json
            scan.log
            ~/nuclei-templates/
          retention-days: 90
