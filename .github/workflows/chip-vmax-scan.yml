name: "🧠 CHỦ NHÂN VŨ TRỤ - CHIP V500.12 FINAL"

on:
  workflow_dispatch:
    inputs:
      severity_level:
        description: '📊 MỨC ĐỘ LỖ HỔNG'
        required: false
        default: 'critical,high,medium,low,info'
        type: choice
        options:
          - critical,high
          - critical,high,medium
          - critical,high,medium,low
          - critical,high,medium,low,info
      scan_mode:
        description: '🚀 CHẾ ĐỘ QUÉT'
        required: false
        default: 'ultimate'
        type: choice
        options:
          - fast
          - smart
          - deep
          - ultimate
      ai_level:
        description: '🧠 CẤP ĐỘ AI'
        required: false
        default: '10000x'
        type: choice
        options:
          - 1000x
          - 5000x
          - 10000x
      target_count:
        description: '🎯 SỐ WEB CẦN CHỌN'
        required: false
        default: '200'
        type: choice
        options:
          - 100
          - 200
          - 300
          - 500
  schedule:
    - cron: '0 */2 * * *'

jobs:
  ultimate-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    
    steps:
      - name: 🧠 KHỞI TẠO
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║     🧠 CHIP V500.12 FINAL - CHỌN LỌC WEB + QUÉT LỖ HỔNG                   ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo "🎯 SỐ WEB: ${{ github.event.inputs.target_count || '200' }}"

      - name: 📥 TẢI MÃ NGUỒN
        uses: actions/checkout@v4

      - name: 📦 CÀI ĐẶT CÔNG CỤ
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends jq curl git python3 python3-pip unzip wget
          sudo rm -rf /var/lib/apt/lists/*
          
          wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          echo "export PATH=$PATH:/usr/local/go/bin" >> ~/.bashrc
          
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          pip3 install -q requests beautifulsoup4 lxml
          
          for i in 1 2 3; do
            nuclei -update-templates -silent && break || sleep 5
          done
          
          mkdir -p ~/nuclei-templates
          cd ~/nuclei-templates
          git clone --depth 1 -q https://github.com/projectdiscovery/nuclei-templates.git official 2>/dev/null || true
          git clone --depth 1 -q https://github.com/geeknik/nuclei-templates.git geeknik 2>/dev/null || true
          git clone --depth 1 -q https://github.com/notnotnotveg/nuclei-templates.git extra 2>/dev/null || true
          
          echo "✅ CÀI ĐẶT HOÀN TẤT!"

      - name: 📥 GIAI ĐOẠN 1 - CHỌN LỌC WEB
        id: select_targets
        run: |
          echo "📥 GIAI ĐOẠN 1: CHỌN LỌC WEB"
          
          # Tạo file Python bằng echo (KHÔNG HEREDOC)
          echo 'import json, requests, subprocess, time, sys' > /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo 'print("🧠 CHỌN LỌC WEB THÔNG MINH")' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo 'all_sites = []' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo '# NGUỒN 1: Top 1M' >> /tmp/selector.py
          echo 'print("📥 Đang tải Top 1M...")' >> /tmp/selector.py
          echo 'try:' >> /tmp/selector.py
          echo '    r = requests.get("https://raw.githubusercontent.com/mehulj94/top-1m/master/top-1m.txt", timeout=30)' >> /tmp/selector.py
          echo '    if r.status_code == 200:' >> /tmp/selector.py
          echo '        for line in r.text.splitlines()[:5000]:' >> /tmp/selector.py
          echo '            domain = line.strip().lower()' >> /tmp/selector.py
          echo '            if domain and "." in domain:' >> /tmp/selector.py
          echo '                all_sites.append(domain)' >> /tmp/selector.py
          echo '        print(f"  ✅ Lấy {len(all_sites)} web từ Top 1M")' >> /tmp/selector.py
          echo 'except Exception as e:' >> /tmp/selector.py
          echo '    print(f"  ⚠️ Lỗi: {e}")' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo '# NGUỒN 2: Danh sách mẫu' >> /tmp/selector.py
          echo 'default_sites = [' >> /tmp/selector.py
          echo '    "google.com","facebook.com","youtube.com","twitter.com","instagram.com",' >> /tmp/selector.py
          echo '    "linkedin.com","reddit.com","netflix.com","amazon.com","microsoft.com",' >> /tmp/selector.py
          echo '    "apple.com","adobe.com","salesforce.com","oracle.com","ibm.com",' >> /tmp/selector.py
          echo '    "bbc.com","guardian.co.uk","reuters.com","bloomberg.com","ft.com",' >> /tmp/selector.py
          echo '    "alibaba.com","tencent.com","baidu.com","jd.com","naver.com",' >> /tmp/selector.py
          echo '    "stripe.com","paypal.com","shopify.com","github.com","gitlab.com",' >> /tmp/selector.py
          echo '    "vietnamnet.vn","zingnews.vn","tiki.vn","shopee.vn","fpt.vn",' >> /tmp/selector.py
          echo '    "viettel.vn","thegioididong.com","vnexpress.net","dantri.com.vn",' >> /tmp/selector.py
          echo '    "chinhphu.vn","mof.gov.vn","mic.gov.vn","moit.gov.vn"' >> /tmp/selector.py
          echo ']' >> /tmp/selector.py
          echo 'all_sites.extend(default_sites)' >> /tmp/selector.py
          echo 'all_sites = list(set(all_sites))' >> /tmp/selector.py
          echo 'print(f"📊 TỔNG WEB RAW: {len(all_sites)}")' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo '# PHÂN TÍCH ĐIỂM' >> /tmp/selector.py
          echo 'scored = []' >> /tmp/selector.py
          echo 'for site in all_sites:' >> /tmp/selector.py
          echo '    if not site or len(site) < 4:' >> /tmp/selector.py
          echo '        continue' >> /tmp/selector.py
          echo '    domain = site.lower()' >> /tmp/selector.py
          echo '    score = 0' >> /tmp/selector.py
          echo '    reasons = []' >> /tmp/selector.py
          echo '    bounty = 0' >> /tmp/selector.py
          echo '    if any(kw in domain for kw in ["bank","finance","pay","payment"]):' >> /tmp/selector.py
          echo '        score += 40; reasons.append("Tài chính"); bounty += 5000' >> /tmp/selector.py
          echo '    if any(kw in domain for kw in ["crypto","bitcoin","eth","defi","blockchain"]):' >> /tmp/selector.py
          echo '        score += 45; reasons.append("Crypto"); bounty += 10000' >> /tmp/selector.py
          echo '    if any(kw in domain for kw in ["gov","government","state"]):' >> /tmp/selector.py
          echo '        score += 35; reasons.append("Chính phủ"); bounty += 3000' >> /tmp/selector.py
          echo '    if any(kw in domain for kw in ["api","gateway","auth"]):' >> /tmp/selector.py
          echo '        score += 25; reasons.append("API"); bounty += 1500' >> /tmp/selector.py
          echo '    if any(kw in domain for kw in ["admin","login","security"]):' >> /tmp/selector.py
          echo '        score += 20; reasons.append("Admin"); bounty += 1000' >> /tmp/selector.py
          echo '    if any(kw in domain for kw in ["shop","store","cart"]):' >> /tmp/selector.py
          echo '        score += 15; reasons.append("E-commerce"); bounty += 800' >> /tmp/selector.py
          echo '    if len(domain) < 10: score += 5' >> /tmp/selector.py
          echo '    if domain.count(".") > 1: score += 8' >> /tmp/selector.py
          echo '    if domain.endswith(".com"): score += 3' >> /tmp/selector.py
          echo '    if domain.endswith(".gov") or domain.endswith(".edu"): score += 10' >> /tmp/selector.py
          echo '    score = score * 2' >> /tmp/selector.py
          echo '    if score > 10:' >> /tmp/selector.py
          echo '        scored.append({' >> /tmp/selector.py
          echo '            "domain": site,' >> /tmp/selector.py
          echo '            "url": f"https://{site}",' >> /tmp/selector.py
          echo '            "score": score,' >> /tmp/selector.py
          echo '            "reasons": reasons[:3],' >> /tmp/selector.py
          echo '            "bounty_estimate": bounty,' >> /tmp/selector.py
          echo '            "has_money": bounty > 500' >> /tmp/selector.py
          echo '        })' >> /tmp/selector.py
          echo 'print(f"📊 WEB CÓ ĐIỂM > 10: {len(scored)}")' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo '# CHỌN TOP' >> /tmp/selector.py
          echo 'target_count = 200' >> /tmp/selector.py
          echo 'scored.sort(key=lambda x: x["score"], reverse=True)' >> /tmp/selector.py
          echo 'top_candidates = scored[:target_count * 2]' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo '# KIỂM TRA SỐNG' >> /tmp/selector.py
          echo 'alive = []' >> /tmp/selector.py
          echo 'for target in top_candidates:' >> /tmp/selector.py
          echo '    if len(alive) >= target_count:' >> /tmp/selector.py
          echo '        break' >> /tmp/selector.py
          echo '    url = target["url"]' >> /tmp/selector.py
          echo '    try:' >> /tmp/selector.py
          echo '        result = subprocess.run([' >> /tmp/selector.py
          echo '            "curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", url' >> /tmp/selector.py
          echo '        ], capture_output=True, text=True, timeout=5)' >> /tmp/selector.py
          echo '        code = result.stdout.strip()' >> /tmp/selector.py
          echo '        if code in ["200", "301", "302", "403", "401"]:' >> /tmp/selector.py
          echo '            alive.append(target)' >> /tmp/selector.py
          echo '            print(f"  ✅ {url}")' >> /tmp/selector.py
          echo '        else:' >> /tmp/selector.py
          echo '            print(f"  ❌ {url}")' >> /tmp/selector.py
          echo '    except:' >> /tmp/selector.py
          echo '        print(f"  ⚠️ {url}")' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo 'print(f"📊 WEB CÒN SỐNG: {len(alive)}/{target_count}")' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo '# LƯU FILE' >> /tmp/selector.py
          echo 'with open("targets.txt", "w") as f:' >> /tmp/selector.py
          echo '    for t in alive:' >> /tmp/selector.py
          echo '        f.write(f"{t["url"]}\n")' >> /tmp/selector.py
          echo '' >> /tmp/selector.py
          echo 'print(f"✅ ĐÃ CHỌN {len(alive)} WEB")' >> /tmp/selector.py
          
          python3 /tmp/selector.py
          
          TARGET_COUNT=$(wc -l < targets.txt 2>/dev/null || echo 0)
          echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          
          if [ "$TARGET_COUNT" -eq 0 ]; then
              echo "⚠️ KHÔNG TÌM THẤY WEB! DÙNG DANH SÁCH DỰ PHÒNG..."
              echo "https://google.com" > targets.txt
              echo "https://facebook.com" >> targets.txt
              echo "https://twitter.com" >> targets.txt
              echo "https://linkedin.com" >> targets.txt
              echo "https://reddit.com" >> targets.txt
              echo "https://netflix.com" >> targets.txt
              echo "https://amazon.com" >> targets.txt
              echo "https://microsoft.com" >> targets.txt
              echo "https://apple.com" >> targets.txt
              echo "https://adobe.com" >> targets.txt
              TARGET_COUNT=$(wc -l < targets.txt)
              echo "target_count=$TARGET_COUNT" >> $GITHUB_ENV
          fi
          
          echo "🎯 SỐ WEB: $TARGET_COUNT"
          echo "📋 DANH SÁCH WEB (10 MỤC ĐẦU):"
          head -10 targets.txt

      - name: 🔍 GIAI ĐOẠN 2 - QUÉT LỖ HỔNG
        timeout-minutes: 45
        run: |
          echo "🔍 GIAI ĐOẠN 2: QUÉT LỖ HỔNG"
          
          export PATH=$PATH:/usr/local/go/bin
          
          CONCURRENCY=60
          BULK_SIZE=30
          RATE_LIMIT=50
          TIMEOUT=25
          RETRIES=5
          MAX_REDIRECTS=15
          SEVERITY="critical,high,medium,low,info"
          
          nuclei -list targets.txt -severity "$SEVERITY" \
            -t ~/nuclei-templates/ \
            -t ~/nuclei-templates/official/ \
            -t ~/nuclei-templates/geeknik/ \
            -t ~/nuclei-templates/extra/ \
            -c $CONCURRENCY -bulk-size $BULK_SIZE -rate-limit $RATE_LIMIT \
            -timeout $TIMEOUT -retries $RETRIES -max-redirects $MAX_REDIRECTS -follow-redirects \
            -stats -stats-interval 15 -rdb report.db -json-export results.json \
            -jle results.jsonl -o results.txt -no-interactsh -disable-update-check \
            -max-host-error 15 -no-mhe -silent -no-color 2>&1 | tee scan.log
          
          echo "📊 KẾT QUẢ QUÉT:"
          TOTAL=$(cat results.txt 2>/dev/null | wc -l || echo 0)
          echo "📦 TỔNG LỖI: $TOTAL"
          
          if [ -f results.json ]; then
              CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
              HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
              MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
              echo "🔥 CRITICAL: $CRITICAL"
              echo "⚡ HIGH: $HIGH"
              echo "🟡 MEDIUM: $MEDIUM"
          fi

      - name: 📄 BÁO CÁO
        if: always()
        run: |
          TOTAL=$(jq -s 'length' results.json 2>/dev/null || echo 0)
          CRITICAL=$(jq -r 'select(.info.severity=="critical")' results.json 2>/dev/null | wc -l || echo 0)
          HIGH=$(jq -r 'select(.info.severity=="high")' results.json 2>/dev/null | wc -l || echo 0)
          MEDIUM=$(jq -r 'select(.info.severity=="medium")' results.json 2>/dev/null | wc -l || echo 0)
          TARGET_COUNT=$(cat targets.txt 2>/dev/null | wc -l || echo 0)
          
          ESTIMATED_BOUNTY=$((CRITICAL * 5000 + HIGH * 1000 + MEDIUM * 200))
          
          echo "═══════════════════════════════════════════════════════════════════════════════" > FINAL_REPORT.txt
          echo "     🧠 CHIP V500.12 FINAL - BÁO CÁO" >> FINAL_REPORT.txt
          echo "═══════════════════════════════════════════════════════════════════════════════" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "📅 $(date '+%Y-%m-%d %H:%M:%S')" >> FINAL_REPORT.txt
          echo "🎯 SỐ WEB: $TARGET_COUNT" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "📦 TỔNG LỖI: $TOTAL" >> FINAL_REPORT.txt
          echo "🔥 CRITICAL: $CRITICAL  (💰 \$5,000+/lỗi)" >> FINAL_REPORT.txt
          echo "⚡ HIGH: $HIGH          (💰 \$1,000+/lỗi)" >> FINAL_REPORT.txt
          echo "🟡 MEDIUM: $MEDIUM      (💰 \$200+/lỗi)" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "💰 BOUNTY: \$$(printf "%'d" $ESTIMATED_BOUNTY)" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "✅ BÁO CÁO HOÀN TẤT!" >> FINAL_REPORT.txt
          
          cat FINAL_REPORT.txt

      - name: 💾 LƯU KHO BÁU
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chip-v500-report-${{ github.run_id }}
          path: |
            results.txt
            results.json
            FINAL_REPORT.txt
            targets.txt
            scan.log
          retention-days: 90
